<!doctype html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=0.3,maximum-scale=5,user-scalable=yes"><title>HARMONOGRAM VÝROBY - Měsíční přehled</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',Arial,sans-serif;background:#f0f2f5;color:#111;-webkit-font-smoothing:antialiased;font-size:100%}
.topbar{background:#1a1a2e;color:#fff;min-height:64px;padding:0 16px;display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.title-left{font-size:18px;font-weight:700;color:#c8d0e0}
.topbar h1{margin:0;text-align:center;font-size:22px;font-weight:800;letter-spacing:2px;color:#fff}
.actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;align-items:center}
.btn{border-radius:6px;border:none;color:#fff;text-decoration:none;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;padding:7px 14px;font-size:13px;white-space:nowrap}
.btn.green{background:#16a34a}.btn.week{background:#2563eb}.btn.nav{background:#64748b}
.wrap{padding:10px 12px}
.card{background:#fff;border:1px solid #a0aabb;border-radius:8px;overflow:hidden}
.month-toolbar{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid #a0aabb;background:#fff;flex-wrap:wrap}
.month-toolbar .right{margin-left:auto}
input[type=month]{height:34px;border:1px solid #a0aabb;border-radius:6px;padding:2px 10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#374151;background:#f8fafc}
.table-wrap{overflow:auto;background:#fff}
table{border-collapse:collapse;table-layout:fixed;min-width:2350px;width:max-content;font-size:13px}
th,td{border:1px solid #a0aabb;height:28px;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th{font-weight:700;background:#f5f7fa;font-size:12px;color:#374151}
.col-lok{width:150px}.col-obj{width:150px}.col-smes{width:230px}.col-itt{width:100px}.col-ceta{width:110px}.day{width:60px}
.day-b{background:#eff6ff}
.day-w{background:#d1d5db;color:#374151}
.day-h{background:#86efac;color:#14532d}
.missing-order{background:#fef9c3!important;color:#854d0e}
.sticky-head th{position:sticky;top:0;z-index:3}
.sticky-head-2 th{position:sticky;top:28px;z-index:3}
.left-head{background:#dbeafe!important;color:#1e3a8a!important}
.week-sep td{border-top:3px solid #1a1a2e!important}
.legend{font-size:12px;text-align:center;padding:8px 12px;border-top:1px solid #a0aabb;background:#f8fafc;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:5px;font-weight:500;color:#374151}
.box{display:inline-block;width:14px;height:10px;border:1px solid #a0aabb;border-radius:2px}
.note{text-align:center;font-size:11px;color:#6b7280;padding:6px 12px;border-top:1px solid #a0aabb;background:#f8fafc}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
/* ═══════════════════════════════════
   MOBIL <= 900px  (portrait i landscape)
   ═══════════════════════════════════ */
@media(max-width:900px){
  .topbar{display:flex;flex-direction:row;align-items:center;padding:0 5px;min-height:26px;height:26px;gap:3px}
  .topbar h1{font-size:9px;font-weight:700;letter-spacing:.1px;white-space:nowrap;margin:0;flex:1;text-align:center}
  .title-left{font-size:8px;color:#94a3b8;white-space:nowrap;overflow:hidden;max-width:80px;text-overflow:ellipsis;flex-shrink:0}
  .actions{gap:2px;flex-wrap:nowrap;flex-shrink:0}
  .actions .btn{padding:1px 5px;font-size:8px;border-radius:3px}
  /* Skrýt export tlačítko na mobilu */
  .btn.green{display:none!important}
  .wrap{padding:1px 2px}
  .card{border-radius:3px}
  .month-toolbar{padding:3px 4px;gap:3px}
  .month-toolbar .right{margin-left:auto}
  input[type=month]{height:24px;font-size:9px;padding:1px 5px;border-radius:4px}
  table{font-size:10px}
  th,td{height:20px;padding:0 2px;font-size:10px}
  th{height:21px;font-size:9px}
  .col-lok{width:90px}.col-obj{width:80px}.col-smes{width:140px}.col-itt{width:65px}.col-ceta{width:65px}.day{width:38px}
  .sticky-head-2 th{top:20px}
  .legend{display:none}
  .note{display:none}
}
/* ═══════════════════════════════════
   LANDSCAPE: sirka<=900, vyska<500
   ═══════════════════════════════════ */
@media(max-width:900px) and (max-height:500px){
  .topbar{height:22px;min-height:22px}
  .topbar h1{font-size:8px}
  .title-left{display:none}
  .wrap{padding:1px}
  .month-toolbar{padding:2px 3px}
  input[type=month]{height:20px;font-size:8px;padding:1px 4px}
  table{font-size:9px}
  th,td{height:17px;padding:0 1px;font-size:9px}
  th{height:18px;font-size:8px}
  .col-lok{width:75px}.col-obj{width:65px}.col-smes{width:115px}.col-itt{width:55px}.col-ceta{width:55px}.day{width:32px}
  .sticky-head-2 th{top:17px}
}
</style></head>
<body>
<header class="topbar">
  <div class="title-left" id="pageTitle">Měsíční přehled</div>
  <h1>HARMONOGRAM VÝROBY</h1>
  <div class="actions">
    <button class="btn nav" onclick="shiftMonth(-1)">‹ Předchozí</button>
    <button class="btn nav" onclick="thisMonth()">Tento měsíc</button>
    <button class="btn nav" onclick="shiftMonth(1)">Další ›</button>
    <a class="btn week" href="/">Týdenní kalendář</a>
  </div>
</header>
<main class="wrap"><section class="card">
  <div class="month-toolbar">
    <div><button class="btn green" onclick="exportMonth()">⬇ Export tabulka</button></div>
    <div class="right"><input id="monthPick" type="month" onchange="render()"></div>
  </div>
  <div class="table-wrap" id="tableWrap"></div>
  <div class="legend">
    <span><i class="box" style="background:#eff6ff;border-color:#bfdbfe"></i> všední den</span>
    <span><i class="box" style="background:#d1d5db;border-color:#9ca3af"></i> víkend</span>
    <span><i class="box" style="background:#86efac;border-color:#4ade80"></i> svátek ČR</span>
    <span><i class="box" style="background:#fef9c3;border-color:#fde68a"></i> chybí objednávka</span>
    <span><i class="box" style="background:#fee2e2;border-color:#fca5a5"></i> překročen limit</span>
  </div>
  <div class="note">Data jsou navázaná na týdenní kalendář. Týdny jsou odděleny výraznou linkou.</div>
</section></main>
<script>
const FIRMA_ORDER = {'Colas':0,'Firesta':1,'Mi Roads':2};
let _entries = {};
let _companies = [{name:'Colas',color:'#fef08a',text:'#713f12'},{name:'Firesta',color:'#bbf7d0',text:'#14532d'},{name:'Mi Roads',color:'#fecdd3',text:'#9f1239'}];
let _maxDaily = 1000;
let _weekStarts = []; // seřazené pondělky pro určení hranic týdnů

function n(v){const x=parseInt(String(v||'').replace(/\D+/g,''),10);return isNaN(x)?0:x}
function cc(name){return _companies.find(x=>x.name===name)||{color:'',text:'#111'}}
function defaultMonth(){const d=new Date();return d.toISOString().slice(0,7)}
function monthName(m){return['LEDEN','ÚNOR','BŘEZEN','DUBEN','KVĚTEN','ČERVEN','ČERVENEC','SRPEN','ZÁŘÍ','ŘÍJEN','LISTOPAD','PROSINEC'][m]}
function iso(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function esc(v){return String(v||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function easterSunday(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da)}
function addDays(dt,days){const d=new Date(dt);d.setDate(d.getDate()+days);return d}
function isHoliday(id){
  const[y,m,d]=id.split('-').map(Number);
  const fixed=['01-01','05-01','05-08','07-05','07-06','09-28','10-28','11-17','12-24','12-25','12-26'];
  if(fixed.includes(String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')))return true;
  const e=easterSunday(y);
  return id===addDays(e,-2).toISOString().slice(0,10)||id===addDays(e,1).toISOString().slice(0,10);
}
function dayClass(id){
  if(isHoliday(id))return 'day-h';
  const dow=new Date(id).getDay();
  return(dow===0||dow===6)?'day-w':'day-b';
}
function daySum(id){return(_entries[id]||[]).reduce((s,e)=>s+n(e.tuny),0)}

// Vrátí pondělí pro daný datum
function mondayOf(id){
  const d=new Date(id);
  const dow=d.getDay();
  const diff=(dow===0?-6:1-dow);
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}

function rowsForMonth(y,m){
  // Seskupit záznamy po týdnech, uvnitř každého týdne řadit Colas→Firesta→Mi Roads
  const weekMap={};
  Object.keys(_entries).sort().forEach(id=>{
    const dt=new Date(id);
    if(dt.getFullYear()===y&&dt.getMonth()===m){
      (_entries[id]||[]).forEach(e=>{
        if(!(e.smes||'').trim()||!(e.itt||'').trim()||!(e.ceta||'').trim())return;
        const ws=mondayOf(id);
        if(!weekMap[ws])weekMap[ws]={};
        const key=[e.lokalita||'',e.objednavka||'',e.smes||'',e.itt||'',e.ceta||''].join('|');
        if(!weekMap[ws][key])weekMap[ws][key]={lokalita:e.lokalita||'',objednavka:e.objednavka||'',smes:e.smes||'',itt:e.itt||'',ceta:e.ceta||'',weekStart:ws,days:{}};
        const d=dt.getDate();
        weekMap[ws][key].days[d]=(weekMap[ws][key].days[d]||0)+n(e.tuny);
      });
    }
  });
  // Seřadit týdny a uvnitř každého firmy
  const result=[];
  Object.keys(weekMap).sort().forEach(ws=>{
    const rows=Object.values(weekMap[ws]);
    rows.sort((a,b)=>{
      const oa=FIRMA_ORDER[a.ceta]!==undefined?FIRMA_ORDER[a.ceta]:99;
      const ob=FIRMA_ORDER[b.ceta]!==undefined?FIRMA_ORDER[b.ceta]:99;
      if(oa!==ob)return oa-ob;
      return(a.lokalita||'').localeCompare(b.lokalita||'','cs');
    });
    rows.forEach((r,i)=>{r._firstInWeek=(i===0);});
    result.push(...rows);
  });
  return result;
}

function render(){
  const val=monthPick.value||defaultMonth();
  localStorage.setItem('hmg_month_selected',val);
  const[yy,mm]=val.split('-');const y=parseInt(yy),m=parseInt(mm)-1;
  pageTitle.textContent='Měsíční přehled | '+monthName(m)+' / '+y;
  const days=new Date(y,m+1,0).getDate();
  const rows=rowsForMonth(y,m);

  // Hlavička - datumy
  const dayIds=[];
  for(let d=1;d<=days;d++)dayIds.push(iso(y,m,d));

  let h='<table id="monthTable"><thead>';
  // Řádek součtů
  h+='<tr class="sticky-head"><th class="left-head col-lok"></th><th class="left-head col-obj"></th><th class="left-head col-smes"></th><th class="left-head col-itt"></th><th class="left-head col-ceta">Součet t/den:</th>';
  for(let d=1;d<=days;d++){
    const id=iso(y,m,d);
    const ds=daySum(id);
    const over=ds>0&&ds>=_maxDaily;
    const dc=dayClass(id);
    const hideDay=_isViewer&&id<todayStr;
    let style=over?'background:#fee2e2;color:#991b1b;font-weight:800'
      :dc==='day-h'?'background:#86efac;color:#14532d;font-weight:800'
      :dc==='day-w'?'background:#d1d5db;color:#374151;font-weight:800'
      :'background:#dbeafe;color:#1e3a8a;font-weight:800';
    if(hideDay)style+=';display:none';
    h+='<th class="day" style="'+style+'">'+(hideDay?'':ds)+'</th>';
  }
  h+='</tr>';
  // Řádek datumů
  h+='<tr class="sticky-head-2"><th class="col-lok">lokalita</th><th class="col-obj">objednávka</th><th class="col-smes">Směs a průkazná zk. typu</th><th class="col-itt">ITT</th><th class="col-ceta">četa</th>';
  const todayStr=new Date().toISOString().slice(0,10);
  for(let d=1;d<=days;d++){
    const id=iso(y,m,d);
    const dc=dayClass(id);
    const hideCol=_isViewer&&id<todayStr;
    h+='<th class="day '+dc+'" style="font-size:11px'+(hideCol?';display:none':'')+'">'+(hideCol?'':d+'.'+(m+1)+'.')+'</th>';
  }
  h+='</tr></thead><tbody>';

  if(!rows.length){
    for(let i=0;i<20;i++){
      h+='<tr><td></td><td></td><td></td><td></td><td></td>';
      for(let d=1;d<=days;d++){const id=iso(y,m,d);const hideD=_isViewer&&id<todayStr;h+='<td class="'+dayClass(id)+'" style="'+(hideD?'display:none':'')+'">'+'</td>';}
      h+='</tr>';
    }
  } else {
    rows.forEach(r=>{
      const firma=cc(r.ceta);
      const bg=firma.color?'background:'+firma.color+';color:#111;':'';
      const sepClass=r._firstInWeek?'week-sep':'';
      h+='<tr class="'+sepClass+'"><td style="text-align:left;padding-left:8px;'+bg+'">'+esc(r.lokalita)+'</td>';
      h+='<td style="'+((!r.objednavka)?'background:#fef9c3;color:#854d0e;':bg)+'">'+esc(r.objednavka)+'</td>';
      h+='<td style="text-align:center;'+bg+'">'+esc(r.smes)+'</td>';
      h+='<td style="font-size:11px;'+bg+'">'+esc(r.itt)+'</td><td style="'+bg+'font-weight:500">'+esc(r.ceta)+'</td>';
      for(let d=1;d<=days;d++){
        const id=iso(y,m,d);
        const dc=dayClass(id);
        h+='<td class="'+dc+'">'+(r.days[d]||'')+'</td>';
      }
      h+='</tr>';
    });
  }
  h+='</tbody></table>';
  tableWrap.innerHTML=h;
}

function shiftMonth(delta){const val=monthPick.value||defaultMonth();const[y,m]=val.split('-').map(Number);let ny=y,nm=m-1+delta;if(nm>11){nm=0;ny++;}if(nm<0){nm=11;ny--;}const newVal=ny+'-'+String(nm+1).padStart(2,'0');if(_isViewer&&newVal<_minMonth)return;monthPick.value=newVal;render();updateNavButtons();}
function thisMonth(){monthPick.value=defaultMonth();render()}
function exportMonth(){const table=document.getElementById('monthTable');if(!table)return;const html='<html><head><meta charset="UTF-8"><style>table{border-collapse:collapse;font-family:Arial;font-size:10pt}th,td{border:1px solid #222;padding:4px;text-align:center}.day-b{background:#ddebf7}.day-w{background:#d1d5db}.day-h{background:#86efac}.missing-order{background:#fff200}</style></head><body>'+table.outerHTML+'<footer style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fafafa;border-top:0.5px solid #f0f0f0"><div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#c4c9d4"><div style="width:26px;height:26px;border-radius:50%;background:#f0f2f8;color:#c4c9d4;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center" id="footerAvatar">?</div><span id="footerUser"></span></div><button onclick="doLogout()" style="background:none;border:0.5px solid #f0f0f0;border-radius:6px;color:#d1d5db;font-size:12px;font-family:Inter,sans-serif;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="ti ti-logout" style="font-size:14px" aria-hidden="true"></i> Odhlásit se</button></footer>
</body></html>';const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8'}));a.download='mesicni_harmonogram.xls';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}


// ── Viewer omezení ──
let _isViewer = false;
let _minMonth = ''; // viewer nemůže jít před tento měsíc

async function checkViewerRole() {
  try {
    const me = await fetch('/api/me').then(r=>r.json());
    _isViewer = (me.role === 'hmg_share');
    if (_isViewer) {
      // Nastavit minimální měsíc na aktuální
      _minMonth = defaultMonth();
      // Skrýt export tlačítko
      const exportBtn = document.querySelector('.btn.green');
      if (exportBtn) exportBtn.style.display = 'none';
      // Skrýt tlačítko Týdenní kalendář
      const weekBtn = document.querySelector('.btn.week');
      if (weekBtn) weekBtn.style.display = 'none';
      // Skrýt tlačítko Předchozí pokud jsme na aktuálním měsíci
      updateNavButtons();
    }
    // Zobrazit/skrýt settings tlačítko
    const sb = document.getElementById('settingsBtn');
    if (sb && me.role === 'admin') sb.style.display = '';
    const el = document.getElementById('footerUser');
    if (el && me.username) el.textContent = me.username;
  } catch(e) {}
}

function updateNavButtons() {
  if (!_isViewer) return;
  const prevBtn = document.querySelector('.btn.nav[onclick*="shiftMonth(-1)"]');
  if (prevBtn) {
    const current = monthPick.value || defaultMonth();
    prevBtn.style.display = (current <= _minMonth) ? 'none' : '';
  }
}

async function init(){
  try{
    const[companies,weeks,settings]=await Promise.all([
      fetch('/api/companies').then(r=>r.json()).catch(()=>null),
      fetch('/api/weeks').then(r=>r.json()).catch(()=>[]),
      fetch('/api/settings').then(r=>r.json()).catch(()=>({}))
    ]);
    if(companies)_companies=companies;
    if(settings&&settings.hmg_max_daily){
      _maxDaily=parseInt(settings.hmg_max_daily,10);
      if(isNaN(_maxDaily)||_maxDaily<=0)_maxDaily=1000;
    }
    _entries={};
    (weeks||[]).forEach(w=>{
      const start=w.start;
      const rows=w.rows||[];
      for(let i=0;i<7;i++){
        const d=new Date(start);d.setDate(d.getDate()+i);
        const isoStr=d.toISOString().slice(0,10);
        _entries[isoStr]=[];
        rows.forEach(r=>{const tuny=parseInt(r['d'+i]||'0',10);if(tuny>0)_entries[isoStr].push({lokalita:r.lokalita||'',objednavka:r.objednavka||'',smes:r.smes||'',itt:r.itt||'',ceta:r.ceta||'',tuny});});
      }
    });
  }catch(e){console.error(e);}
  const savedMonth = localStorage.getItem('hmg_month_selected') || defaultMonth();
  await checkViewerRole();
  // Viewer začíná na aktuálním měsíci
  monthPick.value = _isViewer ? defaultMonth() : savedMonth;
  render();
  if (_isViewer) updateNavButtons();
}
init();

).catch(()=>{});
  window.location.href='/login';
}

fetch('/api/me').then(r=>r.json()).then(d=>{
  const el=document.getElementById('footerUser');
  if(el&&d.username)el.textContent=d.username;
  const sb=document.getElementById('settingsBtn');
  if(sb&&d.role==='admin')sb.style.display='';
}).catch(()=>{});
</script><footer style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fafafa;border-top:0.5px solid #f0f0f0"><div style="display:flex;align-items:center;gap:8px;font-size:13px;color:#c4c9d4"><div style="width:26px;height:26px;border-radius:50%;background:#f0f2f8;color:#c4c9d4;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center" id="footerAvatar">?</div><span id="footerUser"></span></div><button onclick="doLogout()" style="background:none;border:0.5px solid #f0f0f0;border-radius:6px;color:#d1d5db;font-size:12px;font-family:Inter,sans-serif;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="ti ti-logout" style="font-size:14px" aria-hidden="true"></i> Odhlásit se</button></footer>
</body></html>
