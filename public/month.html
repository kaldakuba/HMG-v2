<!doctype html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=0.3,maximum-scale=5,user-scalable=yes">
<meta name="author" content="Jakub Kalousek">
<meta name="copyright" content="Copyright 2026 Jakub Kalousek. All rights reserved."><title>TAXIS OH</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<meta name="apple-mobile-web-app-title" content="TAXIS OH">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/order-approval.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',Arial,sans-serif;background:#f0f2f5;color:#111;-webkit-font-smoothing:antialiased;font-size:100%}
.topbar{background:#f3efe7;color:#1a1a1a;border-bottom:1px solid #ebebeb;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-logo{font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-0.02em}
.hdr-sep{width:1px;height:22px;background:#ccc;display:inline-block}
.hdr-sub{font-size:15px;color:#555;font-weight:500;white-space:nowrap}
.hdr-nav{display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-firma{font-size:11px;color:#2c5545;background:#e6f0ec;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.hdr-user{font-size:14px;color:#666;white-space:nowrap}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#555;flex-shrink:0}
.navpill{padding:7px 13px;border-radius:6px;font-size:14px;color:#555;background:transparent;font-weight:400;text-decoration:none;cursor:pointer}
.navpill:hover{color:#444;background:#f5f5f5}
.navpill.active{color:#fff;background:#1a1a1a;font-weight:500;cursor:default;pointer-events:none}
.actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;align-items:center}
.btn{border-radius:6px;border:none;color:#fff;text-decoration:none;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;padding:7px 14px;font-size:13px;white-space:nowrap}
.btn.green{background:#16a34a}.btn.week{background:#2563eb}
.btn.nav{color:#888;background:#fff;border:1px solid #ddd;padding:5px 12px;border-radius:5px;font-size:12px;font-weight:500}
.btn.nav.cur{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.month-toolbar .btn.export{font-size:12px;color:#2c5545;background:#e6f0ec;border:1px solid #c5ddd3;padding:5px 14px;border-radius:5px;font-weight:600}
#monthContext{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;padding:0 4px}
.wrap{padding:10px 12px}
.card{background:#fff;border:1px solid #a0aabb;border-radius:8px;overflow:hidden}
.month-toolbar{display:flex;align-items:center;gap:8px;padding:8px 24px;border-bottom:1px solid #ebebeb;background:#ffffff;flex-wrap:wrap}
.month-toolbar .right{margin-left:auto}
input[type=month]{height:34px;border:1px solid #a0aabb;border-radius:6px;padding:2px 10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#374151;background:#f8fafc}
.table-wrap{overflow:auto;background:#fff}
table{border-collapse:collapse;table-layout:fixed;min-width:2350px;width:max-content;font-size:13px}
th,td{border:1px solid #cfcfcf;height:28px;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th{font-weight:600;background:#f5f5f2;font-size:12px;color:#444;border-bottom:1px solid #cfcfcf}
.col-lok{width:150px}.col-obj{width:150px}.col-smes{width:230px}.col-itt{width:100px}.col-ceta{width:110px}.day{width:60px}
.day-b{background:#dde9fa}
.day-w{background:#e2e2e2;color:#374151}
.day-h{background:#dff5e6;color:#15803d}
.missing-order{background:#fff!important;color:#111;border:1px solid #374151!important}
.sticky-head th{position:sticky;top:0;z-index:3}
.sticky-head-2 th{position:sticky;top:28px;z-index:3}
.left-head{background:#dbeafe!important;color:#1e3a8a!important}
.week-sep td{border-top:3px solid #1a1a2e!important}
.legend{font-size:12px;text-align:center;padding:8px 12px;border-top:1px solid #a0aabb;background:#f8fafc;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:5px;font-weight:500;color:#374151}
.box{display:inline-block;width:14px;height:10px;border:1px solid #a0aabb;border-radius:2px}
.note{text-align:center;font-size:11px;color:#6b7280;padding:6px 12px;border-top:1px solid #a0aabb;background:#f8fafc}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
#monthTotal{font-weight:700;font-size:14px;color:#1e3a8a;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 12px;white-space:nowrap;line-height:1}
/* ═══════════════════════════════════
   MOBIL <= 900px  (portrait i landscape)
   ═══════════════════════════════════ */
@media(max-width:900px){
  .topbar{padding:6px 10px;gap:6px}
  .hdr-logo{font-size:14px}
  .hdr-sub{display:none}
  .navpill{padding:5px 10px;font-size:12px}
  .hdr-user{display:none}
  /* Skrýt export tlačítko na mobilu */
  .btn.green{display:none!important}
  .wrap{padding:1px 2px}
  .card{border-radius:3px}
  .month-toolbar{padding:3px 4px;gap:3px}
  .month-toolbar .right{margin-left:auto}
  input[type=month]{height:24px;font-size:9px;padding:1px 5px;border-radius:4px}
  #monthTotal{font-size:9px;padding:2px 6px;border-radius:3px}
  table{font-size:10px}
  th,td{height:20px;padding:0 2px;font-size:10px}
  th{height:21px;font-size:9px}
  .col-lok{width:90px}.col-obj{width:80px}.col-smes{width:140px}.col-itt{width:65px}.col-ceta{width:65px}.day{width:38px}
  .sticky-head-2 th{top:20px}
  .legend{display:none}
  .note{display:none}
}
/* ═══════════════════════════════════
   LANDSCAPE: sirka<=900, vyska<500
   ═══════════════════════════════════ */
@media(max-width:900px) and (max-height:500px){
  .topbar{height:22px;min-height:22px}
  .topbar h1{font-size:8px}
  .title-left{display:none}
  .wrap{padding:1px}
  .month-toolbar{padding:2px 3px}
  input[type=month]{height:20px;font-size:8px;padding:1px 4px}
  table{font-size:9px}
  th,td{height:17px;padding:0 1px;font-size:9px}
  th{height:18px;font-size:8px}
  .col-lok{width:75px}.col-obj{width:65px}.col-smes{width:115px}.col-itt{width:55px}.col-ceta{width:55px}.day{width:32px}
  .sticky-head-2 th{top:17px}
}
/* B2: osiřelá směs (mimo aktuální receptury) → červeně (sjednoceno s týdenním renderem 4.90) */
.oa-orphan{color:#dc2626!important;font-weight:700}
</style></head>
<body>
<header class="topbar">
  <div class="hdr-brand"><span class="hdr-sub">Harmonogram výroby</span></div>
  <nav class="hdr-nav"><a href="/month-view.html" class="navpill active">Měsíční</a><a href="/dashboard" class="navpill">Seznam staveb</a></nav>
  <div class="hdr-right"><span class="hdr-firma" id="hdrFirma" style="display:none"></span><span class="hdr-user" id="hdrUser"></span><span class="hdr-avatar" id="hdrAvatar"></span></div>
</header>
<main class="wrap"><section class="card">
  <div class="month-toolbar">
    <button class="btn green export" id="exportBtn">Export dat</button>
    <div class="right">
      <button class="btn nav" id="prevMonthBtn">‹ Předchozí</button>
      <button class="btn nav cur" id="thisMonthBtn">Tento měsíc</button>
      <button class="btn nav" id="nextMonthBtn">Další ›</button>
      <span id="monthContext"></span>
      <span id="monthTotal"></span>
      <input id="monthPick" type="month">
    </div>
  </div>
  <div class="table-wrap" id="tableWrap"></div>
  <div class="note">Data jsou navázaná na týdenní kalendář. Týdny jsou odděleny výraznou linkou.</div>
</section></main>
<div style="border-top:1px solid #e5e7eb;padding:12px 20px;display:flex;justify-content:flex-end;align-items:center;gap:16px;background:#f8fafc;">
  <span id="footerVersion" style="font-size:13px;font-weight:500;color:#9ca3af;letter-spacing:1.5px">TAXIS · 2026</span>
  <button id="logoutBtn" style="display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid #fca5a5;border-radius:6px;color:#dc2626;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;padding:6px 14px;line-height:1;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Odhlásit se</button>
</div>
<script src="/js/recipe-normalize.js"></script>
<script src="/js/month.js"></script>
</body></html>
