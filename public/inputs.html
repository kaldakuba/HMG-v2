<!doctype html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Jakub Kalousek">
<meta name="copyright" content="Copyright 2026 Jakub Kalousek. All rights reserved."><title>TAXIS OH</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<meta name="apple-mobile-web-app-title" content="TAXIS OH">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a1a">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',Arial,sans-serif;background:#f0f2f5;color:#111;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:110%}
.topbar{background:#f3efe7;color:#1a1a1a;border-bottom:1px solid #ebebeb;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-logo{font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-0.02em}
.hdr-sep{width:1px;height:22px;background:#ccc;display:inline-block}
.hdr-sub{font-size:15px;color:#555;font-weight:500;white-space:nowrap}
.hdr-nav{display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-firma{font-size:11px;color:#2c5545;background:#e6f0ec;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.hdr-user{font-size:14px;color:#666;white-space:nowrap}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#555;flex-shrink:0}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{border-radius:6px;border:none;color:#fff;text-decoration:none;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;padding:7px 14px;font-size:13px;white-space:nowrap;transition:filter .15s}
.btn:hover{filter:brightness(1.1)}
.btn.week,.btn.blue{background:#2563eb}.btn.month{background:#64748b}.btn.green{background:#16a34a}.btn.red{background:#dc2626}.btn.orange{background:#ea580c}.btn.graybtn{background:#64748b}
.btn.nav{color:#555;background:transparent;border:none;padding:7px 13px;border-radius:6px;font-size:14px;font-weight:400}
.btn.nav:hover{color:#444;background:#f5f5f5;filter:none}
.btn.nav.active{color:#fff;background:#1a1a1a;font-weight:500;cursor:default;pointer-events:none}
/* Světlý "soft" styl tlačítek (vzor: Export dat) — jeden zdroj stylu + barevné tóny */
.btn-soft{display:inline-flex;align-items:center;gap:6px;border-radius:5px;border:1px solid transparent;padding:6px 14px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;transition:background .12s;filter:none}
.btn-soft:hover{filter:none}
.btn-soft.green{color:#2c5545;background:#e6f0ec;border-color:#c5ddd3}
.btn-soft.green:hover{background:#dceae3}
.btn-soft.orange{color:#9a5520;background:#fbe9d8;border-color:#f0d2b3}
.btn-soft.orange:hover{background:#f7ddc6}
.btn-soft.gray{color:#555;background:#eeeeee;border-color:#dcdcdc}
.btn-soft.gray:hover{background:#e4e4e4}
.btn-soft.red{color:#9a2f2f;background:#fbe2e2;border-color:#f0c0c0}
.btn-soft.red:hover{background:#f6d4d4}
.btn-soft.blue{color:#1e4e8c;background:#e4eefb;border-color:#bcd4f0}
.btn-soft.blue:hover{background:#d6e4f7}
.wrap{padding:10px 12px}
.card{background:#fff;border:1px solid #a0aabb;border-radius:8px;overflow:hidden;width:100%}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid #a0aabb;background:#fff}
.toolbar-left{display:flex;gap:6px;align-items:center}
.toolbar-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.file-hidden{display:none}
.table-wrap{overflow-x:auto;background:#fff;width:100%}
table{border-collapse:collapse;width:100%;min-width:1720px;font-size:13px;table-layout:fixed}
th,td{border:1px solid #a0aabb;padding:3px 5px;height:30px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}
th{background:#f5f5f2;font-weight:500;font-size:12px;color:#888;letter-spacing:.2px;border-bottom:1px solid #e5e5e0}
.col-num{width:3.2%}.col-smes{width:18.6%}.col-itt{width:8.5%}.col-frakce{width:3.65%}.col-pojivo{width:5.35%}.col-2030{width:3.65%}.col-prach{width:3.65%}.col-vapenec{width:4.75%}.col-addbit{width:3.85%}.col-scel{width:3.65%}.col-ra{width:5.55%}.col-celkem{width:4.3%}
.gray{background:#f3f4f6!important}.green-cell{background:#f0fdf4!important}
.sum-bad{background:#fee2e2!important;color:#991b1b!important;font-weight:700!important}
.sum-ok{background:#f0fdf4!important;color:#15803d!important;font-weight:700!important}
.thick-top td{border-top:3px solid #a0aabb}
.selected-row td{background:#eff6ff!important;outline:2px solid #3b82f6;outline-offset:-2px}

/* FORM CARD */
.form-card{margin:0;background:#f8fafc;border-top:1px solid #a0aabb;padding:14px 12px}
.form-card h2{margin:0 0 10px;font-size:15px;font-weight:700;color:#374151}
.total-row{width:100%;min-width:1720px;display:flex;justify-content:center;margin-bottom:10px}
.total-field{width:150px}
.total-field label,.field label,.company-form label{display:block;font-size:10px;font-weight:700;margin-bottom:2px;color:#6b7280;text-transform:uppercase;letter-spacing:.3px}
.total-field input{width:100%;height:32px;border:1.5px solid #a0aabb;border-radius:5px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;text-align:center;background:#fff}
.total-ok{background:#f0fdf4!important;border-color:#86efac!important;color:#15803d!important}
.total-bad{background:#fee2e2!important;border-color:#fca5a5!important;color:#991b1b!important}
.input-error{background:#fee2e2!important;border:1.5px solid #f87171!important}
#inputGrid{display:grid;grid-template-columns:3.2% 18.6% 8.5% 3.65% 3.65% 3.65% 3.65% 3.65% 3.65% 5.35% 5.35% 5.35% 3.65% 3.65% 4.75% 3.85% 3.65% 5.55% 5.55%;min-width:1720px;gap:0}
.field{padding:0 2px}
.field input{width:100%;height:28px;border:1px solid #a0aabb;border-radius:4px;text-align:center;font-family:'Inter',sans-serif;font-size:12px;background:#fff}
.field input:focus{outline:2px solid #3b82f6;border-color:#3b82f6}
.form-actions{margin-top:10px;display:flex;gap:8px}

/* SETTINGS */
.settings-card{margin:10px 12px;background:#f8fafc;border:1px solid #a0aabb;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.settings-field{display:flex;align-items:center;gap:8px}
.settings-field label{font-size:13px;font-weight:700;color:#374151;white-space:nowrap}
.settings-field input{width:100px;height:34px;border:1px solid #a0aabb;border-radius:5px;padding:2px 8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;text-align:center;background:#fff}
.settings-field input:focus{outline:2px solid #3b82f6;border-color:#3b82f6}

/* COMPANIES */
#selectedInfo{font-size:12px;font-weight:700;color:#374151}
.cpanel-card{background:#fff;border:1px solid #a0aabb;border-radius:8px;overflow:hidden;margin:10px 12px 12px}
.cpanel-hdr{padding:10px 14px;border-bottom:1px solid #a0aabb;background:#f8fafc;font-size:14px;font-weight:700;color:#374151;display:flex;align-items:center;gap:8px}
.cpanel-table{width:100%;border-collapse:collapse;font-size:13px}
.cpanel-table th{background:#f5f7fa;font-weight:700;font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.3px;padding:6px 10px;border-bottom:1px solid #a0aabb;text-align:left}
.cpanel-table td{padding:6px 10px;border-bottom:1px solid #e5e7eb;vertical-align:middle}
.cpanel-table tbody tr:last-child td{border-bottom:none}
.cpanel-table tbody tr:hover{background:#f8fafc}
.cpanel-drag{cursor:grab;color:#9ca3af;user-select:none;display:inline-flex;align-items:center}
.cpanel-drag:active{cursor:grabbing}
.cpanel-swatch{width:28px;height:28px;border-radius:5px;border:1px solid #a0aabb;cursor:pointer;padding:1px 2px;display:block}
.cpanel-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700}
.cpanel-delbtn{background:none;border:1px solid #fca5a5;border-radius:5px;color:#991b1b;cursor:pointer;padding:3px 8px;font-size:15px;line-height:1}
.cpanel-delbtn:hover{background:#fee2e2}
.cpanel-addrow{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid #a0aabb;background:#f8fafc;flex-wrap:wrap}
.cpanel-addrow input[type=text]{height:32px;border:1px solid #a0aabb;border-radius:5px;padding:2px 8px;font-family:'Inter',sans-serif;font-size:13px;background:#fff;min-width:160px}
.cpanel-addrow input[type=text]:focus{outline:2px solid #3b82f6;border-color:#3b82f6}
.cpanel-addrow input[type=color]{width:46px;height:32px;padding:1px 3px;cursor:pointer;border:1px solid #a0aabb;border-radius:5px}
.cpanel-hint{padding:6px 14px 10px;font-size:11px;color:#9ca3af}
.row-dragging{opacity:.35}
.row-drag-over td{border-top:2px solid #3b82f6!important}

/* IMPORT/EXPORT BAR */
.import-bar{padding:10px 12px;border-top:1px solid #a0aabb;background:#f8fafc;display:flex;align-items:center;gap:8px}

/* EDIT MODE */
.edit-mode td{cursor:pointer}
.edit-mode td.editable-cell{background:#fffbeb!important;outline:1px solid #f59e0b}
.edit-input{width:100%;height:24px;border:1px solid #f59e0b;background:#fffbeb;text-align:center;font:inherit;font-family:'Inter',sans-serif;font-size:12px;padding:0 2px;border-radius:3px}

::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
@media(max-width:900px){.topbar{padding:10px 12px}.hdr-sub{display:none}.wrap{padding:6px}}
</style></head>
<body>
<header class="topbar">
  <div class="hdr-brand"><span class="hdr-sub">Harmonogram výroby</span></div>
  <nav class="hdr-nav" id="navMenu"></nav>
  <div class="hdr-right">
    <span class="hdr-user" id="hdrUser"></span>
    <span class="hdr-avatar" id="hdrAvatar"></span>
  </div>
</header>
<main class="wrap"><section class="card">

  <div class="toolbar">
    <div class="toolbar-left">
      <button class="btn-soft orange" id="importBtn">↑ Import směsí</button>

      <input id="importFile" class="file-hidden" type="file" accept=".xls,.html,.htm,.csv">
      <button class="btn-soft blue" id="exportBtn">⬇ Export směsí</button>
    </div>
    <div class="toolbar-right">
      <button class="btn-soft green" id="editBtn">Editovat recepturu</button>
      <button class="btn-soft red" id="deleteBtn">Smazat označený</button>
      <button class="btn-soft gray" id="undoBtn">↩ Zpět</button>
      <span id="selectedInfo">Není označen žádný řádek</span>
    </div>
  </div>

  <div class="table-wrap">
    <table id="mixTable">
      <colgroup><col class="col-num"><col class="col-smes"><col class="col-itt"><col class="col-frakce"><col class="col-frakce"><col class="col-frakce"><col class="col-frakce"><col class="col-frakce"><col class="col-frakce"><col class="col-pojivo"><col class="col-pojivo"><col class="col-pojivo"><col class="col-2030"><col class="col-prach"><col class="col-vapenec"><col class="col-addbit"><col class="col-scel"><col class="col-ra"><col class="col-ra"><col class="col-celkem"></colgroup>
      <thead><tr id="headRow"></tr></thead>
      <tbody id="mixBody"></tbody>
    </table>
  </div>

  <div class="form-card">
    <h2>Přidat směs</h2>
    <div class="total-row"><div class="total-field"><label>Celkem</label><input id="in_celkem" readonly value="0"></div></div>
    <div id="inputGrid"></div>
    <div class="form-actions">
      <button class="btn-soft green" id="addMixBtn">+ Přidat směs</button>
      <button class="btn-soft gray" id="clearFormBtn">Vyčistit formulář</button>
    </div>
  </div>

</section>

<div class="settings-card">
  <div class="settings-field">
    <label>Výkon obalovny t/h:</label>
    <input id="plantRateInput" type="number" step="1" value="150">
  </div>
  <div class="settings-field">
    <label>Denní kapacita plynu (m³):</label>
    <input id="gasCapacityInput" type="number" step="100" value="10000" style="width:120px">
  </div>
  <div class="settings-field">
    <label>Max. denní výkon (t):</label>
    <input id="maxDailyInput" type="number" step="10" value="1000">
  </div>
  <div class="settings-field">
    <label>Min. denní výkon (t):</label>
    <input id="minDailyInput" type="number" step="10" value="0">
  </div>
  <button class="btn-soft green" id="saveSettingsBtn">Uložit nastavení</button>
  <span id="settingsSaved" style="font-size:13px;color:#16a34a;font-weight:700;display:none">✓ Uloženo</span>
</div>

<div class="cpanel-card">
  <div class="cpanel-hdr">🎨 Firmy a barvy (legenda)</div>
  <table class="cpanel-table">
    <thead>
      <tr>
        <th style="width:44px">Řazení</th>
        <th>Název firmy</th>
        <th style="width:80px">Barva</th>
        <th>Náhled</th>
        <th style="width:60px">Akce</th>
      </tr>
    </thead>
    <tbody id="companyTbody"></tbody>
  </table>
  <div class="cpanel-addrow">
    <input id="companyName" type="text" placeholder="Název firmy">
    <input id="companyColor" type="color" value="#fff2a8">
    <button class="btn-soft green" id="saveCompanyBtn">+ Přidat firmu</button>
  </div>
  <div class="cpanel-hint">Správa firem je pouze legenda. Pořadí firem určuje řazení v měsíčním přehledu. Přetažením změníš pořadí.</div>
</div>

</main>

<style>
.invite-row input{flex:1;height:36px;border:1px solid #a0aabb;border-radius:6px;padding:2px 12px;font-family:'Inter',sans-serif;font-size:13px;color:#111}
.invite-row input:focus{outline:2px solid #3b82f6;border-color:#3b82f6}
.btn-invite:hover{filter:brightness(1.1)}
.btn-copy.copied{background:#16a34a}
.badge-active{background:#d9ead3;color:#14532d;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700}
.badge-pending{background:#fef9c3;color:#854d0e;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700}
.badge-revoked{background:#fee2e2;color:#991b1b;border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700}
.vbtn{border:1px solid #a0aabb;background:#fff;border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;color:#374151}
.vbtn:hover{background:#f0f2f5}
.vbtn.red{border-color:#fca5a5;color:#991b1b}
.vbtn.red:hover{background:#fee2e2}
.vbtn.green{border-color:#86efac;color:#15803d}
.vbtn.green:hover{background:#d9ead3}
</style>





<div style="border-top:1px solid #e5e7eb;padding:12px 20px;display:flex;justify-content:flex-end;align-items:center;gap:16px;background:#f8fafc;">
  <span id="footerVersion" style="font-size:13px;font-weight:500;color:#9ca3af;letter-spacing:1.5px">TAXIS · 2026</span>
  <button id="logoutBtn" style="display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid #fca5a5;border-radius:6px;color:#dc2626;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;padding:6px 14px;line-height:1;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Odhlásit se</button>
</div>
<script src="/js/inputs.js"></script>
</body></html>
