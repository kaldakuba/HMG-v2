<!doctype html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Přihlášení – Harmonogram výroby</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Arial,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#111}
.card{background:#fff;border:1px solid #a0aabb;border-radius:12px;padding:40px 36px;width:100%;max-width:400px}
.logo{font-size:11px;font-weight:700;color:#6b7280;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;text-align:center}
h1{font-size:20px;font-weight:800;letter-spacing:1px;color:#1a1a2e;margin-bottom:28px;text-align:center}
label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;letter-spacing:.3px}
input[type=text],input[type=password]{width:100%;height:42px;border:1px solid #a0aabb;border-radius:7px;padding:0 12px;font-family:'Inter',sans-serif;font-size:14px;color:#111;background:#f8fafc;margin-bottom:16px;outline:none;transition:border-color .15s}
input[type=text]:focus,input[type=password]:focus{border-color:#2563eb;background:#fff}
button{width:100%;height:44px;background:#1a1a2e;color:#fff;border:none;border-radius:7px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .15s}
button:hover{background:#2d2d4e}
button:disabled{background:#94a3b8;cursor:not-allowed}
.err{background:#fef2f2;border:1px solid #fca5a5;border-radius:7px;padding:11px 14px;font-size:13px;color:#991b1b;font-weight:600;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Harmonogram výroby</div>
  <h1>Přihlášení</h1>
  <div class="err" id="errBox"></div>
  <label for="username">Uživatelské jméno</label>
  <input type="text" id="username" autocomplete="username" autofocus>
  <label for="password">Heslo</label>
  <input type="password" id="password" autocomplete="current-password">
  <button id="loginBtn" onclick="doLogin()">Přihlásit se</button>
</div>
<script>
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errBox');
  err.style.display = 'none';
  if (!username || !password) { showErr('Vyplňte jméno a heslo.'); return; }
  btn.disabled = true;
  btn.textContent = 'Přihlašuji...';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok && data.ok) {
      window.location.href = '/';
    } else {
      showErr(data.error || 'Nesprávné jméno nebo heslo.');
      btn.disabled = false;
      btn.textContent = 'Přihlásit se';
    }
  } catch (e) {
    showErr('Chyba připojení k serveru.');
    btn.disabled = false;
    btn.textContent = 'Přihlásit se';
  }
}

function showErr(msg) {
  const e = document.getElementById('errBox');
  e.textContent = msg;
  e.style.display = 'block';
}
</script>
<meta name="author" content="Jakub Kalousek">
<meta name="copyright" content="Copyright 2026 Jakub Kalousek. All rights reserved.">
</body>
</html>
