<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',Arial,sans-serif;background:#f0f2f5;color:#111;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:100%}
.topbar{background:#f3efe7;color:#1a1a1a;border-bottom:1px solid #ebebeb;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-logo{font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-0.02em}
.hdr-sep{width:1px;height:22px;background:#ccc;display:inline-block}
.hdr-sub{font-size:15px;color:#555;font-weight:500;white-space:nowrap}
.hdr-nav{display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-firma{font-size:11px;color:#2c5545;background:#e6f0ec;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.hdr-user{font-size:14px;color:#666;white-space:nowrap}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#555;flex-shrink:0}
.hdr-right .actions:empty{display:none}
.actions,.weeknav,.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{border-radius:6px;border:none;color:#fff;text-decoration:none;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;padding:7px 14px;font-size:13px;white-space:nowrap;transition:filter .15s}
.btn:hover{filter:brightness(1.1)}
.btn.nav{color:#555;background:transparent;border:none;padding:7px 13px;border-radius:6px;font-size:14px;font-weight:400}
.btn.nav:hover{color:#444;background:#f5f5f5;filter:none}
.btn.nav.active{color:#fff;background:#1a1a1a;font-weight:500;cursor:default;pointer-events:none}
.btn.month{background:#2563eb}.btn.inputs{background:#7c3aed}.btn.green{background:#16a34a}.btn.red{background:#dc2626}.btn.gray{background:#64748b}.btn.blue{background:#2563eb}.btn.orange,.btn.top-orange{background:#ea580c}.btn.export{background:#15803d}
.wrap{padding:10px 12px}
.card{background:#fff;border:1px solid #a0aabb;border-radius:8px;overflow:hidden}
.weekbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:8px 24px;border-bottom:1px solid #ebebeb;background:#ffffff}
/* Světlý "soft" styl tlačítek (vzor: Export dat) — jeden zdroj stylu + barevné tóny */
.btn-soft{display:inline-flex;align-items:center;gap:6px;border-radius:5px;border:1px solid transparent;padding:6px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;transition:background .12s;filter:none}
.btn-soft:hover{filter:none}
.btn-soft.green{color:#2c5545;background:#e6f0ec;border-color:#c5ddd3}
.btn-soft.green:hover{background:#dceae3}
.btn-soft.orange{color:#9a5520;background:#fbe9d8;border-color:#f0d2b3}
.btn-soft.orange:hover{background:#f7ddc6}
.btn-soft.gray{color:#555;background:#eeeeee;border-color:#dcdcdc}
.btn-soft.gray:hover{background:#e4e4e4}
.weekbar .weeknav .btn{font-size:12px;color:#888;background:#fff;border:1px solid #ddd;padding:5px 12px;border-radius:5px;font-weight:500}
.weekbar .weeknav .btn.blue{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.weekbar #weekContext{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;padding:0 4px}
#calToggleBtn{height:34px;border:1px solid #a0aabb;border-radius:6px;padding:2px 10px;font-size:13px;font-weight:600;color:#374151;background:#f8fafc;display:inline-flex;align-items:center;gap:6px;line-height:1}
.table-wrap{overflow-x:auto;overflow-y:visible;background:#fff;width:100%}
table{border-collapse:collapse;width:100%;table-layout:fixed;font-size:13px}
th,td{border:1px solid #cfcfcf;height:34px;padding:1px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px;font-weight:500}
th{font-weight:700;background:#f5f5f2;font-size:12px;color:#333;letter-spacing:.2px;height:36px;border-color:#cfcfcf}
.cap-label{text-align:left;font-weight:700;padding-left:10px;font-size:12px;color:#333}
.cap-value{background:#fef9c3!important;font-weight:800;font-size:13px;color:#854d0e!important;border-color:#c8a84b!important}
.sum-label{text-align:right;font-weight:600;font-size:12px;color:#555;padding-right:6px}
.sum-head{background:#cfe0fa!important;font-weight:800;font-size:13px;color:#1e3a8a!important}
.sel{width:3%}.num{width:3%}.lok{width:8%}.obj{width:9%}.smes{width:13%}.itt{width:9%}.ceta{width:7%}.day{width:5%}.souhrn{width:6%}
.blue-day{background:#dde9fa}.gray-day{background:#e2e2e2}.holiday-day{background:#dff5e6}
.row-total{font-weight:600;font-size:13px;background:#f5f5f2!important;color:#111!important}
.hours-row td{background:#f5f5f2!important;font-weight:600;height:32px;font-size:12px;color:#475569!important;border-top:2px solid #e0e0dc!important}
.editable,.select-cell{width:100%;height:28px;border:0;background:transparent;text-align:center;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:#111}
.editable:focus,.select-cell:focus{outline:2px solid #3b82f6;background:#eff6ff;border-radius:3px}
.select-cell{cursor:pointer}
.day-input{width:100%;height:28px;border:0;background:transparent;text-align:center;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#1e293b}
.day-input:focus{outline:2px solid #3b82f6;background:#eff6ff;border-radius:3px}
.controls{margin-top:0;border-top:1px solid #a0aabb;padding:10px 12px;background:#f8fafc}
.panel-wrap{overflow:auto;border:1px solid #a0aabb;border-radius:6px;background:#fff;display:inline-block;max-width:100%}
.material-table,.mix-table{min-width:0;width:auto;table-layout:fixed}
.material-table .mat-name{width:140px}.material-table .mat-val{width:80px}
.mix-table td:first-child,.mix-table th:first-child{width:180px}
.mix-table td:nth-child(2),.mix-table th:nth-child(2){width:100px}
.mix-table .mix-day,.mix-table .mix-total{width:80px}
.material-table th,.material-table td,.mix-table th,.mix-table td{height:26px;min-width:44px;font-size:12px}
.section-head{background:#e5e7eb!important;font-weight:700;font-size:11px;letter-spacing:.4px;color:#374151;text-transform:uppercase}
.mat-name{background:#fff7ed!important;font-weight:700;text-align:left;padding-left:8px!important;color:#111}
.mat-val{text-align:right;min-width:70px;font-size:12px}
.mix-day{background:#f0fdf4!important}.mix-total{background:#f8fafc!important;font-weight:700}
input[type=checkbox]{-webkit-appearance:none;appearance:none;width:16px;height:16px;border:1.5px solid #9ca3af;border-radius:50%;cursor:pointer;vertical-align:middle;position:relative;background:#fff;flex-shrink:0}
input[type=checkbox]:checked{background:#2563eb;border-color:#2563eb}
input[type=checkbox]:checked::after{content:"";position:absolute;left:4px;top:1px;width:5px;height:9px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.row-checked td{border-top:2px solid #2563eb!important;border-bottom:2px solid #2563eb!important;background:rgba(59,130,246,.06)!important}
.row-checked td:first-child{border-left:2px solid #2563eb!important}.row-checked td:last-child{border-right:2px solid #2563eb!important}
.sel-hidden .sel-col input{visibility:hidden!important}.sel-hidden .sel-col{background:#fff!important}.sel-hidden .delete-btn,.sel-hidden .move-btn{display:none!important}.sel-hidden th.sel-col{color:transparent!important}
.move-btn{padding:7px 10px!important;font-size:14px!important;line-height:1}.move-btn:disabled{opacity:.4;cursor:not-allowed}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.saving-indicator{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none}
.saving-indicator.show{opacity:1}
/* Logout tlačítko — kosmetický hover (přesunuto z inline onmouseenter/leave kvůli CSP) */
.logout-btn{background:transparent}
.logout-btn:hover{background:#fff1f2}
/* Osiřelá směs (B2): smes/cislo/itt mimo aktuální receptury → zobraz uloženou hodnotu červeně. */
.oa-orphan{color:#dc2626!important;font-weight:700}
/* GPS tlačítko v buňce lokalita */
.gps-btn{position:absolute;right:2px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;padding:1px 2px;border-radius:3px;opacity:.35;line-height:1;z-index:1;transition:opacity .15s}
.gps-btn:hover{opacity:1;background:#f3f4f6}
.gps-btn.has-gps{opacity:1;color:#16a34a}
/* Mapový overlay */
.map-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:10000;align-items:center;justify-content:center}
.map-overlay.open{display:flex!important}
.map-box{background:#fff;border-radius:12px;overflow:hidden;width:min(640px,96vw);max-height:92vh;box-shadow:0 8px 40px rgba(0,0,0,.3);display:flex;flex-direction:column}
.map-hdr{padding:12px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.map-hdr h3{font-size:14px;font-weight:600;margin:0;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#mapImgArea{background:#f0f2f5;flex-shrink:0;overflow:hidden;min-height:100px}
.map-search-bar{padding:10px 16px;border-bottom:1px solid #e5e7eb;display:flex;gap:8px;align-items:center;flex-shrink:0}
.map-search-inp{flex:1;height:34px;border:0.5px solid #d1d5db;border-radius:6px;padding:0 10px;font-family:Inter,sans-serif;font-size:13px;outline:none;color:#111}
.map-search-inp:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.map-ftr{padding:10px 16px;border-top:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;flex-shrink:0}
.map-coord-row{display:flex;align-items:center;gap:6px;flex:1;min-width:0;flex-wrap:wrap}
.map-coord-inp{width:124px;height:30px;border:0.5px solid #d1d5db;border-radius:6px;padding:0 8px;font-size:12px;font-family:monospace;color:#111;outline:none}
.map-coord-inp:focus{border-color:#2563eb}

/* ═══════════════════════════════════════════════════
   MOBILNÍ READ-ONLY MÓD — třída .mobile-ro na <body>
   Přidána JS při načtení pokud window.innerWidth<=900
   ═══════════════════════════════════════════════════ */
/* Topbar - kompaktní, jen název týdne + navigace */
body.mobile-ro .topbar{
  display:flex;flex-direction:row;align-items:center;flex-wrap:nowrap;
  padding:6px 10px;min-height:auto;height:auto;gap:8px;
  background:#fff;border-bottom:1px solid #ebebeb;overflow-x:auto;
}
body.mobile-ro .hdr-logo{font-size:15px;font-weight:700;flex-shrink:0}
body.mobile-ro .hdr-sep{height:18px}
body.mobile-ro .m-weeknav{display:flex;align-items:center;gap:4px;flex-shrink:0}
body.mobile-ro .m-arrow{font-size:15px;padding:7px 16px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;line-height:1;font-family:'Inter',sans-serif}
body.mobile-ro .m-today{font-size:13px;padding:7px 12px;border-radius:6px;border:1px solid #1a1a1a;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500;white-space:nowrap;font-family:'Inter',sans-serif}
body.mobile-ro .m-weekinfo{display:flex;flex-direction:column;line-height:1.15;flex-shrink:0}
body.mobile-ro #mWeekNum{font-size:14px;font-weight:700;color:#1a1a1a;white-space:nowrap}
body.mobile-ro #mWeekRange{font-size:12px;color:#999;white-space:nowrap}
body.mobile-ro .hdr-right{margin-left:auto;gap:6px;flex-shrink:0}
body.mobile-ro .weekbar{display:none!important}
/* Skrýt vše nepotřebné v topbaru */
body.mobile-ro .actions{display:none!important}
/* Weekbar - jen navigace šipkami, nic jiného */
body.mobile-ro .weekbar{padding:3px 4px;gap:2px;flex-wrap:nowrap;justify-content:center}
body.mobile-ro .btn.top-orange{display:none!important}
body.mobile-ro #calToggleBtn{display:none!important}
body.mobile-ro .weeknav{gap:2px;flex-wrap:nowrap;justify-content:center;width:100%}
body.mobile-ro .weeknav .btn{padding:9px 4px;font-size:11px;font-weight:700;min-width:0!important;flex:1;text-align:center;line-height:1.3}
/* Skrýt celý controls panel (přidání řádků, označit, zpět, export) */
body.mobile-ro .controls{display:none!important}
/* Skrýt panely spotřeby a směsí */
body.mobile-ro #panelsRow{display:none!important}
/* Skrýt saving indicator */
body.mobile-ro .saving-indicator{display:none!important}
/* Tabulka - kompaktní */
body.mobile-ro .wrap{padding:0}
body.mobile-ro .card{border-radius:0;border-left:none;border-right:none}
body.mobile-ro table{font-size:10px}
body.mobile-ro th,body.mobile-ro td{height:20px;padding:0 2px;font-size:10px}
body.mobile-ro th{height:21px;font-size:9px;letter-spacing:0}
/* V read-only módu renderujeme text místo inputů - viz JS renderMobile() */
body.mobile-ro .cap-label,.mobile-ro .sum-label{font-size:9px;padding-left:3px}
body.mobile-ro .cap-value,.mobile-ro .sum-head{font-size:10px}
body.mobile-ro .row-total{font-size:10px}
body.mobile-ro .hours-row td{height:18px;font-size:9px}
/* Landscape: výška < 500px */
@media(max-height:500px){
  body.mobile-ro .topbar{height:auto;min-height:auto;padding:4px 8px}
  body.mobile-ro .m-arrow{padding:5px 12px}
  body.mobile-ro .m-today{padding:5px 10px}
  body.mobile-ro .wrap{padding:0}
  body.mobile-ro .weekbar{padding:2px 3px}
  body.mobile-ro table{font-size:9px}
  body.mobile-ro th,body.mobile-ro td{height:17px;padding:0 1px;font-size:9px}
  body.mobile-ro th{height:18px;font-size:8px}
  body.mobile-ro .hours-row td{height:15px;font-size:8px}
}
</style></head>
<body>
<div class="saving-indicator" id="savingIndicator">Ukládám...</div>
<header class="topbar"><div class="hdr-brand"><span class="hdr-sub">Harmonogram výroby</span></div><nav class="hdr-nav" id="navMenu"></nav><div class="hdr-right"><div class="actions"></div><span class="hdr-firma" id="hdrFirma" style="display:none"></span><span class="hdr-user" id="hdrUser"></span><span class="hdr-avatar" id="hdrAvatar"></span></div></header>
<main class="wrap"><section class="card">
<div class="weekbar"><div style="display:flex;align-items:center;gap:8px;"><span id="weekTitle" style="display:none"></span><button class="btn-soft green" id="exportWeeksBtn">Export dat</button></div><div class="weeknav"><button class="btn gray" id="prevWeekBtn">‹ Předchozí</button><button class="btn blue" id="currentWeekBtn">Tento týden</button><button class="btn gray" id="nextWeekBtn">Další ›</button><div style="position:relative;display:inline-block;"><button class="btn gray" id="calToggleBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><span id="calWeekLabel">Kalendář</span></button><div id="miniCal" style="display:none;position:absolute;right:0;top:38px;z-index:9999;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12);padding:14px;width:300px;font-family:'Inter',sans-serif;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><button id="miniCalPrevBtn" style="border:none;background:none;cursor:pointer;font-size:20px;font-weight:900;color:#374151;line-height:1;">‹</button><span id="miniCalHeader" style="font-weight:700;font-size:14px;color:#111;"></span><button id="miniCalNextBtn" style="border:none;background:none;cursor:pointer;font-size:20px;font-weight:900;color:#374151;line-height:1;">›</button></div><div id="miniCalGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;"><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Po</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Út</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">St</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Čt</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Pá</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">So</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Ne</div></div></div></div></div></div>
<div class="table-wrap"><table id="weekTable" class="sel-hidden"><colgroup><col class="num"><col class="lok"><col class="obj"><col class="smes"><col class="itt"><col class="ceta"><col class="day"><col class="day"><col class="day"><col class="day"><col class="day"><col class="day"><col class="day"><col class="souhrn"><col class="sel"></colgroup><thead id="thead"></thead><tbody id="tbody"></tbody><tfoot id="tfoot"></tfoot></table></div>
<div class="controls"><input id="plantRate" type="number" step="1" value="150" style="display:none"><div style="margin-right:auto;display:flex;gap:8px;"><button class="btn-soft orange" id="materialsPanelBtn">Spotřeba materiálu</button><button class="btn-soft orange" id="mixesPanelBtn">Seznam směsí</button></div><button class="btn btn-soft green" id="addRowBtn">Přidat nový řádek</button><button class="btn-soft gray" id="selModeBtn">Označit</button><button class="btn gray move-btn" id="moveUpBtn" title="Přesunout označený řádek nahoru" style="display:none">▲</button><button class="btn gray move-btn" id="moveDownBtn" title="Přesunout označený řádek dolů" style="display:none">▼</button><button class="btn red delete-btn" id="deleteRowsBtn" style="display:none">Smazat vybrané řádky</button><button class="btn btn-soft gray" id="undoBtn">Zpět</button><span id="selectedInfo" style="display:none"></span></div>
<div id="panelsRow" style="display:none;gap:16px;align-items:flex-start;flex-wrap:wrap;padding:12px;"><div id="materialsPanel" style="display:none"><h2 style="font-size:14px;font-weight:700;margin:0 0 8px">Spotřeba materiálu</h2><div class="panel-wrap" id="materialsArea"></div></div><div id="mixesPanel" style="display:none"><h2 style="font-size:14px;font-weight:700;margin:0 0 8px">Seznam směsí</h2><div class="panel-wrap" id="mixesArea"></div></div>
</section></main>

<!-- ══ GPS / MAPA OVERLAY ══ -->
<div class="map-overlay" id="mapOverlay">
  <div class="map-box">
    <div class="map-hdr">
      <h3 id="mapPopupTitle">📍 GPS souřadnice</h3>
      <button id="mapCloseHdrBtn" type="button" style="border:none;background:#f3f4f6;border-radius:6px;cursor:pointer;font-size:16px;padding:3px 8px;line-height:1;color:#6b7280;flex-shrink:0">✕</button>
    </div>
    <div class="map-search-bar">
      <input type="text" id="mapSearchInput" class="map-search-inp" placeholder="Hledat adresu nebo lokalitu…">
      <button class="btn blue" id="mapSearchBtn" type="button" style="padding:6px 14px;font-size:12px;flex-shrink:0">🔍 Hledat</button>
    </div>
    <div id="mapImgArea"></div>
    <div class="map-ftr">
      <div class="map-coord-row">
        <span style="font-size:11px;color:#6b7280;white-space:nowrap">Lat / Lng:</span>
        <input type="number" id="mapLatInput" class="map-coord-inp" step="0.000001" placeholder="šířka">
        <input type="number" id="mapLngInput" class="map-coord-inp" step="0.000001" placeholder="délka">
        <button type="button" id="mapApplyBtn" style="border:0.5px solid #d1d5db;background:#f9fafb;border-radius:6px;cursor:pointer;padding:4px 10px;font-size:12px;font-family:Inter,sans-serif;white-space:nowrap">↺ Zobrazit</button>
