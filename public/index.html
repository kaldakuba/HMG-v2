<title>HARMONOGRAM VÝROBY</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="/order-approval.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',Arial,sans-serif;background:#f0f2f5;color:#111;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:100%}
.topbar{background:#f3efe7;color:#1a1a1a;border-bottom:1px solid #ebebeb;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100}
.hdr-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-logo{font-size:16px;font-weight:700;color:#1a1a1a;letter-spacing:-0.02em}
.hdr-sep{width:1px;height:22px;background:#ccc;display:inline-block}
.hdr-sub{font-size:15px;color:#555;font-weight:500;white-space:nowrap}
.hdr-nav{display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-firma{font-size:11px;color:#2c5545;background:#e6f0ec;padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}
.hdr-user{font-size:14px;color:#666;white-space:nowrap}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#555;flex-shrink:0}
.hdr-right .actions:empty{display:none}
.actions,.weeknav,.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{border-radius:6px;border:none;color:#fff;text-decoration:none;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;padding:7px 14px;font-size:13px;white-space:nowrap;transition:filter .15s}
.btn:hover{filter:brightness(1.1)}
.btn.nav{color:#555;background:transparent;border:none;padding:7px 13px;border-radius:6px;font-size:14px;font-weight:400}
.btn.nav:hover{color:#444;background:#f5f5f5;filter:none}
.btn.nav.active{color:#fff;background:#1a1a1a;font-weight:500;cursor:default;pointer-events:none}
.btn.month{background:#2563eb}.btn.inputs{background:#7c3aed}.btn.green{background:#16a34a}.btn.red{background:#dc2626}.btn.gray{background:#64748b}.btn.blue{background:#2563eb}.btn.orange,.btn.top-orange{background:#ea580c}.btn.export{background:#15803d}
.wrap{padding:10px 12px}
.card{background:#fff;border:1px solid #a0aabb;border-radius:8px;overflow:hidden}
.weekbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:8px 24px;border-bottom:1px solid #ebebeb;background:#ffffff}
/* Světlý "soft" styl tlačítek (vzor: Export dat) — jeden zdroj stylu + barevné tóny */
.btn-soft{display:inline-flex;align-items:center;gap:6px;border-radius:5px;border:1px solid transparent;padding:6px 14px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;text-decoration:none;transition:background .12s;filter:none}
.btn-soft:hover{filter:none}
.btn-soft.green{color:#2c5545;background:#e6f0ec;border-color:#c5ddd3}
.btn-soft.green:hover{background:#dceae3}
.btn-soft.orange{color:#9a5520;background:#fbe9d8;border-color:#f0d2b3}
.btn-soft.orange:hover{background:#f7ddc6}
.btn-soft.gray{color:#555;background:#eeeeee;border-color:#dcdcdc}
.btn-soft.gray:hover{background:#e4e4e4}
.weekbar .weeknav .btn{font-size:12px;color:#888;background:#fff;border:1px solid #ddd;padding:5px 12px;border-radius:5px;font-weight:500}
.weekbar .weeknav .btn.blue{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.weekbar #weekContext{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;padding:0 4px}
#calToggleBtn{height:34px;border:1px solid #a0aabb;border-radius:6px;padding:2px 10px;font-size:13px;font-weight:600;color:#374151;background:#f8fafc;display:inline-flex;align-items:center;gap:6px;line-height:1}
.table-wrap{overflow-x:auto;overflow-y:visible;background:#fff;width:100%}
table{border-collapse:collapse;width:100%;table-layout:fixed;font-size:13px}
th,td{border:1px solid #cfcfcf;height:34px;padding:1px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px;font-weight:500}
th{font-weight:700;background:#f5f5f2;font-size:12px;color:#333;letter-spacing:.2px;height:36px;border-color:#cfcfcf}
.cap-label{text-align:left;font-weight:700;padding-left:10px;font-size:12px;color:#333}
.cap-value{background:#fef9c3!important;font-weight:800;font-size:13px;color:#854d0e!important;border-color:#c8a84b!important}
.sum-label{text-align:right;font-weight:600;font-size:12px;color:#555;padding-right:6px}
.sum-head{background:#cfe0fa!important;font-weight:800;font-size:13px;color:#1e3a8a!important}
.sel{width:3%}.num{width:3%}.lok{width:8%}.obj{width:9%}.smes{width:13%}.itt{width:9%}.ceta{width:7%}.day{width:5%}.souhrn{width:6%}
.blue-day{background:#dde9fa}.gray-day{background:#e2e2e2}.holiday-day{background:#dff5e6}
.row-total{font-weight:600;font-size:13px;background:#f5f5f2!important;color:#111!important}
.hours-row td{background:#f5f5f2!important;font-weight:600;height:32px;font-size:12px;color:#475569!important;border-top:2px solid #e0e0dc!important}
.editable,.select-cell{width:100%;height:28px;border:0;background:transparent;text-align:center;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;color:#111}
.editable:focus,.select-cell:focus{outline:2px solid #3b82f6;background:#eff6ff;border-radius:3px}
.select-cell{cursor:pointer}
.day-input{width:100%;height:28px;border:0;background:transparent;text-align:center;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#1e293b}
.day-input:focus{outline:2px solid #3b82f6;background:#eff6ff;border-radius:3px}
.controls{margin-top:0;border-top:1px solid #a0aabb;padding:10px 12px;background:#f8fafc}
.panel-wrap{overflow:auto;border:1px solid #a0aabb;border-radius:6px;background:#fff;display:inline-block;max-width:100%}
.material-table,.mix-table{min-width:0;width:auto;table-layout:fixed}
.material-table .mat-name{width:140px}.material-table .mat-val{width:80px}
.mix-table td:first-child,.mix-table th:first-child{width:180px}
.mix-table td:nth-child(2),.mix-table th:nth-child(2){width:100px}
.mix-table .mix-day,.mix-table .mix-total{width:80px}
.material-table th,.material-table td,.mix-table th,.mix-table td{height:26px;min-width:44px;font-size:12px}
.section-head{background:#e5e7eb!important;font-weight:700;font-size:11px;letter-spacing:.4px;color:#374151;text-transform:uppercase}
.mat-name{background:#fff7ed!important;font-weight:700;text-align:left;padding-left:8px!important;color:#111}
.mat-val{text-align:right;min-width:70px;font-size:12px}
.mix-day{background:#f0fdf4!important}.mix-total{background:#f8fafc!important;font-weight:700}
input[type=checkbox]{-webkit-appearance:none;appearance:none;width:16px;height:16px;border:1.5px solid #9ca3af;border-radius:50%;cursor:pointer;vertical-align:middle;position:relative;background:#fff;flex-shrink:0}
input[type=checkbox]:checked{background:#2563eb;border-color:#2563eb}
input[type=checkbox]:checked::after{content:"";position:absolute;left:4px;top:1px;width:5px;height:9px;border:1.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg)}
.row-checked td{border-top:2px solid #2563eb!important;border-bottom:2px solid #2563eb!important;background:rgba(59,130,246,.06)!important}
.row-checked td:first-child{border-left:2px solid #2563eb!important}.row-checked td:last-child{border-right:2px solid #2563eb!important}
.sel-hidden .sel-col input{visibility:hidden!important}.sel-hidden .sel-col{background:#fff!important}.sel-hidden .delete-btn,.sel-hidden .move-btn{display:none!important}.sel-hidden th.sel-col{color:transparent!important}
.move-btn{padding:7px 10px!important;font-size:14px!important;line-height:1}.move-btn:disabled{opacity:.4;cursor:not-allowed}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.saving-indicator{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none}
.saving-indicator.show{opacity:1}
/* GPS tlačítko v buňce lokalita */
.gps-btn{position:absolute;right:2px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:12px;padding:1px 2px;border-radius:3px;opacity:.35;line-height:1;z-index:1;transition:opacity .15s}
.gps-btn:hover{opacity:1;background:#f3f4f6}
.gps-btn.has-gps{opacity:1;color:#16a34a}
/* Mapový overlay */
.map-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:10000;align-items:center;justify-content:center}
.map-overlay.open{display:flex!important}
.map-box{background:#fff;border-radius:12px;overflow:hidden;width:min(640px,96vw);max-height:92vh;box-shadow:0 8px 40px rgba(0,0,0,.3);display:flex;flex-direction:column}
.map-hdr{padding:12px 16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.map-hdr h3{font-size:14px;font-weight:600;margin:0;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#mapImgArea{background:#f0f2f5;flex-shrink:0;overflow:hidden;min-height:100px}
.map-search-bar{padding:10px 16px;border-bottom:1px solid #e5e7eb;display:flex;gap:8px;align-items:center;flex-shrink:0}
.map-search-inp{flex:1;height:34px;border:0.5px solid #d1d5db;border-radius:6px;padding:0 10px;font-family:Inter,sans-serif;font-size:13px;outline:none;color:#111}
.map-search-inp:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
.map-ftr{padding:10px 16px;border-top:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;flex-shrink:0}
.map-coord-row{display:flex;align-items:center;gap:6px;flex:1;min-width:0;flex-wrap:wrap}
.map-coord-inp{width:124px;height:30px;border:0.5px solid #d1d5db;border-radius:6px;padding:0 8px;font-size:12px;font-family:monospace;color:#111;outline:none}
.map-coord-inp:focus{border-color:#2563eb}

/* ═══════════════════════════════════════════════════
   MOBILNÍ READ-ONLY MÓD — třída .mobile-ro na <body>
   Přidána JS při načtení pokud window.innerWidth<=900
   ═══════════════════════════════════════════════════ */
/* Topbar - kompaktní, jen název týdne + navigace */
body.mobile-ro .topbar{
  display:flex;flex-direction:row;align-items:center;flex-wrap:nowrap;
  padding:6px 10px;min-height:auto;height:auto;gap:8px;
  background:#fff;border-bottom:1px solid #ebebeb;overflow-x:auto;
}
body.mobile-ro .hdr-logo{font-size:15px;font-weight:700;flex-shrink:0}
body.mobile-ro .hdr-sep{height:18px}
body.mobile-ro .m-weeknav{display:flex;align-items:center;gap:4px;flex-shrink:0}
body.mobile-ro .m-arrow{font-size:15px;padding:7px 16px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#555;cursor:pointer;line-height:1;font-family:'Inter',sans-serif}
body.mobile-ro .m-today{font-size:13px;padding:7px 12px;border-radius:6px;border:1px solid #1a1a1a;background:#1a1a1a;color:#fff;cursor:pointer;font-weight:500;white-space:nowrap;font-family:'Inter',sans-serif}
body.mobile-ro .m-weekinfo{display:flex;flex-direction:column;line-height:1.15;flex-shrink:0}
body.mobile-ro #mWeekNum{font-size:14px;font-weight:700;color:#1a1a1a;white-space:nowrap}
body.mobile-ro #mWeekRange{font-size:12px;color:#999;white-space:nowrap}
body.mobile-ro .hdr-right{margin-left:auto;gap:6px;flex-shrink:0}
body.mobile-ro .weekbar{display:none!important}
/* Skrýt vše nepotřebné v topbaru */
body.mobile-ro .actions{display:none!important}
/* Weekbar - jen navigace šipkami, nic jiného */
body.mobile-ro .weekbar{padding:3px 4px;gap:2px;flex-wrap:nowrap;justify-content:center}
body.mobile-ro .btn.top-orange{display:none!important}
body.mobile-ro #calToggleBtn{display:none!important}
body.mobile-ro .weeknav{gap:2px;flex-wrap:nowrap;justify-content:center;width:100%}
body.mobile-ro .weeknav .btn{padding:9px 4px;font-size:11px;font-weight:700;min-width:0!important;flex:1;text-align:center;line-height:1.3}
/* Skrýt celý controls panel (přidání řádků, označit, zpět, export) */
body.mobile-ro .controls{display:none!important}
/* Skrýt panely spotřeby a směsí */
body.mobile-ro #panelsRow{display:none!important}
/* Skrýt saving indicator */
body.mobile-ro .saving-indicator{display:none!important}
/* Tabulka - kompaktní */
body.mobile-ro .wrap{padding:0}
body.mobile-ro .card{border-radius:0;border-left:none;border-right:none}
body.mobile-ro table{font-size:10px}
body.mobile-ro th,body.mobile-ro td{height:20px;padding:0 2px;font-size:10px}
body.mobile-ro th{height:21px;font-size:9px;letter-spacing:0}
/* V read-only módu renderujeme text místo inputů - viz JS renderMobile() */
body.mobile-ro .cap-label,.mobile-ro .sum-label{font-size:9px;padding-left:3px}
body.mobile-ro .cap-value,.mobile-ro .sum-head{font-size:10px}
body.mobile-ro .row-total{font-size:10px}
body.mobile-ro .hours-row td{height:18px;font-size:9px}
/* Landscape: výška < 500px */
@media(max-height:500px){
  body.mobile-ro .topbar{height:auto;min-height:auto;padding:4px 8px}
  body.mobile-ro .m-arrow{padding:5px 12px}
  body.mobile-ro .m-today{padding:5px 10px}
  body.mobile-ro .wrap{padding:0}
  body.mobile-ro .weekbar{padding:2px 3px}
  body.mobile-ro table{font-size:9px}
  body.mobile-ro th,body.mobile-ro td{height:17px;padding:0 1px;font-size:9px}
  body.mobile-ro th{height:18px;font-size:8px}
  body.mobile-ro .hours-row td{height:15px;font-size:8px}
}
</style></head>
<body>
<div class="saving-indicator" id="savingIndicator">Ukládám...</div>
<header class="topbar"><div class="hdr-brand"><span class="hdr-sub">Harmonogram výroby</span></div><nav class="hdr-nav" id="navMenu"></nav><div class="hdr-right"><div class="actions"></div><span class="hdr-firma" id="hdrFirma" style="display:none"></span><span class="hdr-user" id="hdrUser"></span><span class="hdr-avatar" id="hdrAvatar"></span></div></header>
<main class="wrap"><section class="card">
<div class="weekbar"><div style="display:flex;align-items:center;gap:8px;"><span id="weekTitle" style="display:none"></span><button class="btn-soft green" onclick="exportWeeks()">Export dat</button></div><div class="weeknav"><button class="btn gray" onclick="shiftWeek(-1)">‹ Předchozí</button><button class="btn blue" id="currentWeekBtn" onclick="currentWeek()">Tento týden</button><button class="btn gray" onclick="shiftWeek(1)">Další ›</button><div style="position:relative;display:inline-block;"><button class="btn gray" onclick="toggleMiniCal()" id="calToggleBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><span id="calWeekLabel">Kalendář</span></button><div id="miniCal" style="display:none;position:absolute;right:0;top:38px;z-index:9999;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.12);padding:14px;width:300px;font-family:'Inter',sans-serif;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><button onclick="shiftMiniCal(-1)" style="border:none;background:none;cursor:pointer;font-size:20px;font-weight:900;color:#374151;line-height:1;">‹</button><span id="miniCalHeader" style="font-weight:700;font-size:14px;color:#111;"></span><button onclick="shiftMiniCal(1)" style="border:none;background:none;cursor:pointer;font-size:20px;font-weight:900;color:#374151;line-height:1;">›</button></div><div id="miniCalGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;"><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Po</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Út</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">St</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Čt</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Pá</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">So</div><div style="font-size:11px;color:#9ca3af;font-weight:700;padding:3px;">Ne</div></div></div></div></div></div>
<div class="table-wrap"><table id="weekTable" class="sel-hidden"><colgroup><col class="num"><col class="lok"><col class="obj"><col class="smes"><col class="itt"><col class="ceta"><col class="day"><col class="day"><col class="day"><col class="day"><col class="day"><col class="day"><col class="day"><col class="souhrn"><col class="sel"></colgroup><thead id="thead"></thead><tbody id="tbody"></tbody><tfoot id="tfoot"></tfoot></table></div>
<div class="controls"><input id="plantRate" type="number" step="1" value="150" style="display:none" onchange="setPlantRate(this.value);render()"><div style="margin-right:auto;display:flex;gap:8px;"><button class="btn-soft orange" onclick="togglePanel('materialsPanel')">Spotřeba materiálu</button><button class="btn-soft orange" onclick="togglePanel('mixesPanel')">Seznam směsí</button></div><button class="btn btn-soft green" onclick="addRow()">Přidat nový řádek</button><button class="btn-soft gray" onclick="toggleSelMode()" id="selModeBtn">Označit</button><button class="btn gray move-btn" id="moveUpBtn" onclick="moveCheckedUp()" title="Přesunout označený řádek nahoru" style="display:none">▲</button><button class="btn gray move-btn" id="moveDownBtn" onclick="moveCheckedDown()" title="Přesunout označený řádek dolů" style="display:none">▼</button><button class="btn red delete-btn" onclick="deleteCheckedRows()" style="display:none">Smazat vybrané řádky</button><button class="btn btn-soft gray" onclick="undoLast()">Zpět</button><span id="selectedInfo" style="display:none"></span></div>
<div id="panelsRow" style="display:none;gap:16px;align-items:flex-start;flex-wrap:wrap;padding:12px;"><div id="materialsPanel" style="display:none"><h2 style="font-size:14px;font-weight:700;margin:0 0 8px">Spotřeba materiálu</h2><div class="panel-wrap" id="materialsArea"></div></div><div id="mixesPanel" style="display:none"><h2 style="font-size:14px;font-weight:700;margin:0 0 8px">Seznam směsí</h2><div class="panel-wrap" id="mixesArea"></div></div>
</section></main>

<!-- ══ GPS / MAPA OVERLAY ══ -->
<div class="map-overlay" id="mapOverlay">
  <div class="map-box">
    <div class="map-hdr">
      <h3 id="mapPopupTitle">📍 GPS souřadnice</h3>
      <button onclick="closeMapPopup()" type="button" style="border:none;background:#f3f4f6;border-radius:6px;cursor:pointer;font-size:16px;padding:3px 8px;line-height:1;color:#6b7280;flex-shrink:0">✕</button>
    </div>
    <div class="map-search-bar">
      <input type="text" id="mapSearchInput" class="map-search-inp" placeholder="Hledat adresu nebo lokalitu…" onkeydown="if(event.key==='Enter')geocodeSearch()">
      <button class="btn blue" onclick="geocodeSearch()" type="button" style="padding:6px 14px;font-size:12px;flex-shrink:0">🔍 Hledat</button>
    </div>
    <div id="mapImgArea"></div>
    <div class="map-ftr">
      <div class="map-coord-row">
        <span style="font-size:11px;color:#6b7280;white-space:nowrap">Lat / Lng:</span>
        <input type="number" id="mapLatInput" class="map-coord-inp" step="0.000001" placeholder="šířka">
        <input type="number" id="mapLngInput" class="map-coord-inp" step="0.000001" placeholder="délka">
        <button type="button" onclick="applyManualCoords()" style="border:0.5px solid #d1d5db;background:#f9fafb;border-radius:6px;cursor:pointer;padding:4px 10px;font-size:12px;font-family:Inter,sans-serif;white-space:nowrap">↺ Zobrazit</button>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button class="btn gray" style="padding:6px 14px;font-size:12px" onclick="closeMapPopup()" type="button">Zrušit</button>
        <button class="btn green" style="padding:6px 14px;font-size:12px" onclick="saveGpsCoords()" type="button">Uložit souřadnice</button>
      </div>
    </div>
  </div>
</div>

<script>
const dayKeys=['d0','d1','d2','d3','d4','d5','d6'];let undoStack=[];
const mixCols=['c04','c24','c48','c811','c1116','c1622','b5070','b255560','b458065','b2030','prach','vapenec','addbit','scel','ra16','ra22'];

// ── HELPERS ──
function defaultMonday(){const d=new Date();const day=d.getDay()||7;d.setDate(d.getDate()-day+1);return localIso(d)}
function getWeekStart(){return _weekStart}
function setWeekStart(v){_weekStart=v;_rows=null}
function localIso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function isoDateFromStart(startIso,i){const d=new Date(startIso);d.setDate(d.getDate()+i);return localIso(d)}
function fmtShort(iso){const d=new Date(iso);return d.getDate()+'.'+(d.getMonth()+1)+'.'}
function fmtTitleRange(start){const a=new Date(start),b=new Date(start);b.setDate(a.getDate()+6);return a.getDate()+'.'+(a.getMonth()+1)+'. – '+b.getDate()+'.'+(b.getMonth()+1)+'.'+b.getFullYear()}
function updateWeekNavBtn(){
  const btn=document.getElementById('currentWeekBtn');if(!btn)return;
  // Na desktopu vždy původní popis, číslo týdne + rozsah dat jen na mobilu
  if(!IS_MOBILE){btn.innerHTML='Tento týden';return;}
  const week=isoWeek(new Date(_weekStart));
  const range=fmtTitleRange(_weekStart);
  const isCurrent=(_weekStart===defaultMonday());
  btn.innerHTML='<span style="display:block;font-size:13px;font-weight:800">Týden '+week+(isCurrent?' ·&nbsp;aktuální':'')+
    '</span><span style="display:block;font-size:10px;font-weight:500;letter-spacing:0;opacity:.9">'+range+'</span>';
}
function isoWeek(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-yearStart)/86400000)+1)/7)}
function _easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da)}
function isHolidayIso(id){const p=String(id).split('-').map(Number);const y=p[0],m=p[1],d=p[2];const fixed=['01-01','05-01','05-08','07-05','07-06','09-28','10-28','11-17','12-24','12-25','12-26'];if(fixed.includes(String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')))return true;const e=_easter(y);const gf=new Date(e);gf.setDate(e.getDate()-2);const em=new Date(e);em.setDate(e.getDate()+1);return id===localIso(gf)||id===localIso(em)}
function fmtNum(v,dec){if(v===0||v==="0")return "0";if(!v)return "";const num=parseFloat(String(v).replace(",","."));if(isNaN(num))return v;if(dec!==undefined)return num.toLocaleString("cs-CZ",{minimumFractionDigits:dec,maximumFractionDigits:dec}).replace(/ /g," ");return num.toLocaleString("cs-CZ").replace(/ /g," ");}
function n(v){const x=parseInt(String(v||'').replace(/\D+/g,''),10);return isNaN(x)?0:x}
function dec(v){const x=parseFloat(String(v||'').replace(',','.').replace(/[^0-9.\-]/g,''));return isNaN(x)?0:x}
function intVal(v){return String(n(v)||'')}
function rowSum(r){return dayKeys.reduce((s,k)=>s+n(r[k]),0)}
function daySum(rows,k){return rows.reduce((s,r)=>s+n(r[k]),0)}
function snapshot(){undoStack.push(JSON.stringify(_rows));if(undoStack.length>20)undoStack.shift()}
function loadMixes(){return _mixes}
function loadCompanies(){return _companies}
function companyColor(name){const c=_companies.find(x=>x.name===name);return c?c.color:''}
function mixByNumber(v){return _mixes.find(x=>String(x.cislo||'').trim()===String(v||'').trim())}
function mixByName(v){return _mixes.find(x=>String(x.smes||'').trim()===String(v||'').trim())}
function mixByItt(v){return _mixes.find(x=>String(x.zt||x.itt||'').trim()===String(v||'').trim())}
function applyMix(row,m){if(!m)return;row.cislo=m.cislo||row.cislo||'';row.smes=m.smes||'';row.itt=m.zt||m.itt||''}
function uniq(arr){return [...new Set(arr.filter(x=>String(x||'').trim()!==''))]}
function esc(v){return String(v||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

function defaultRows(){return Array.from({length:12},()=>({checked:false,cislo:'',lokalita:'',objednavka:'',smes:'',itt:'',ceta:'',d0:'',d1:'',d2:'',d3:'',d4:'',d5:'',d6:'',lat:null,lng:null}))}

// ── API VOLÁNÍ ──
async function apiLoadWeek(start){
  const r=await fetch('/api/week/'+start);
  if(!r.ok)return null;
  return await r.json();
}
async function apiSaveWeek(start,rows){
  showSaving();
  await fetch('/api/week/'+start,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rows})});
  // sync měsíc
  const entries=buildMonthEntries(rows,start);
  await fetch('/api/month-entries',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entries)});
  showSaved();
}

function buildMonthEntries(rows,start){
  // načti existující a přepiš jen dny tohoto týdne
  return {_week:start,rows,start};
}

async function loadWeek(start){
  const data=await apiLoadWeek(start);
  _rows=data||defaultRows();
}

async function saveRows(){
  if(!_rows)return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>apiSaveWeek(_weekStart,[..._rows]),400);
}

  thead.innerHTML=`<tr><th class="cap-label" colspan="2">Denní kapacita plynu:</th><th class="cap-value">${cap} m3</th><th></th><th class="sum-label" colspan="2">Součet t/den:</th>${dayKeys.map(k=>{const _v=_ds(k);const _oM=_v>maxDaily;const _uM=_v>0&&minDaily>0&&_v<minDaily;return`<th class="sum-head" style="${_oM?'background:#fee2e2!important;color:#991b1b!important;':_uM?'background:#fef9c3!important;color:#92400e!important;':''}">  ${fmtNum(_v)}</th>`;}).join('')}<th class="sum-head">${fmtNum(total)}</th><th class="sel-col"></th></tr><tr style='height:38px'><th>č.</th><th>lokalita</th><th>objednávka</th><th>Směs a průkazná zk. typu</th><th>ITT</th><th>četa</th>${dates.map((d,i)=>{const hol=isHolidayIso(d);const we=i>=5;const cls=hol?'holiday-day':(we?'gray-day':'blue-day');const col=hol?'#15803d':(we?'#9a9a9a':'#555');return `<th class="${cls}" style="color:${col}">${fmtShort(d)}${hol?`<div style="font-size:9px;font-weight:600;color:#15803d;line-height:1">svátek</div>`:''}</th>`;}).join('')}<th>souhrn</th><th class='sel-col'>✓</th></tr>`;
}

function selectOptions(values,current){return `<option value=""></option>${values.map(v=>`<option value="${esc(v)}" ${String(v)===String(current||'')?'selected':''}>${esc(v)}</option>`).join('')}`}

function buildWeekOrderRowsHtml(){
  // Reset per-day order sums (also clears them when non-admin)
  dayKeys.forEach(k=>{_weekOrderDaySums[k]=0;});
  const _ordersEnabledNow=_settings.orders_enabled!=='false';
  if(IS_MOBILE||_role!=='admin'||typeof OA==='undefined'||!_ordersEnabledNow)return '';
  const weekDates=dayKeys.map((_,i)=>isoDateFromStart(_weekStart,i));
  let html='';
  for(const g of OA.getPendingGroups()){
    const weekRows=(g.rows||[]).filter(r=>weekDates.indexOf(String(r.datum).slice(0,10))>=0);
    if(!weekRows.length)continue;
    const byMix={};
    weekRows.forEach(r=>{
      const key=(r.smes||'')+'|'+(r.itt||'');
      if(!byMix[key])byMix[key]={smes:r.smes||'',itt:r.itt||'',daysMap:{},statusMap:{}};
      const d=String(r.datum).slice(0,10);
      byMix[key].daysMap[d]=(byMix[key].daysMap[d]||0)+(parseInt(r.tuny)||0);
      const ord=['pre_rejected','pre_approved','pending'];
      const cur=byMix[key].statusMap[d];
      if(!cur||ord.indexOf(r.status)>ord.indexOf(cur))byMix[key].statusMap[d]=r.status;
    });
    for(const[mixKey,mx]of Object.entries(byMix)){
      weekDates.forEach((d,di)=>{if(mx.daysMap[d])_weekOrderDaySums[dayKeys[di]]+=mx.daysMap[d];});
      html+=OA.buildWeekOrderRow(g,mixKey,mx.smes,mx.itt,mx.daysMap,mx.statusMap,weekDates);
    }
  }
  return html;
}

function render(){
  if(!_rows)return;
  const orderHtml=buildWeekOrderRowsHtml(); // updates _weekOrderDaySums for renderHead
  renderHead();
  const rows=_rows;const nums=uniq(_mixes.map(x=>x.cislo));const smesi=uniq(_mixes.map(x=>x.smes));const itts=uniq(_mixes.map(x=>x.zt||x.itt));
  let html='';
  rows.forEach((r,i)=>{
    const color=companyColor(r.ceta);
    html+=`<tr class="${r.checked?'row-checked':''}" style="${color?'background:'+color:''}"><td style="background:#f8fafc;font-weight:800;font-size:13px"><select class="select-cell" style="font-weight:800" onchange="updateMixSelect(${i},'cislo',this.value)">${selectOptions(nums,r.cislo)}</select></td><td style="position:relative"><input class="editable" style="padding-right:20px" value="${esc(r.lokalita||'')}" onchange="updateCell(${i},'lokalita',this.value)"><button class="gps-btn${r.lat?' has-gps':''}" type="button" onclick="openMapPopup(${i},event)" title="${r.lat?'GPS: '+Number(r.lat).toFixed(4)+', '+Number(r.lng).toFixed(4):'Nastavit GPS'}">📍</button></td><td><input class="editable" value="${esc(r.objednavka||'')}" onchange="updateCell(${i},'objednavka',this.value)"></td><td><select class="select-cell" onchange="updateMixSelect(${i},'smes',this.value)">${selectOptions(smesi,r.smes)}</select></td><td><select class="select-cell" onchange="updateMixSelect(${i},'itt',this.value)">${selectOptions(itts,r.itt)}</select></td><td><select class="select-cell" onchange="updateCell(${i},'ceta',this.value)"><option value=""></option>${_companies.map(c=>`<option value="${esc(c.name)}" ${c.name===(r.ceta||'')?'selected':''}>${esc(c.name)}</option>`).join('')}</select></td>`;
    dayKeys.forEach((k,di)=>{const dv=r[k]?fmtNum(n(r[k])||0)||"":"";const _d=isoDateFromStart(_weekStart,di);const _cls=isHolidayIso(_d)?'holiday-day':(di>=5?'gray-day':'blue-day');html+=`<td class="${_cls}"><input class="day-input" inputmode="numeric" value="${esc(dv)}" onfocus="this.value=String(n(this.value.replace(/ /g,''))||this.value)" onchange="updateCell(${i},'${k}',this.value,false,true)"></td>`;});
    html+=`<td class="row-total">${fmtNum(rowSum(r))}</td><td class="sel-col" style="background:#f8fafc"><input type="checkbox" ${r.checked?'checked':''} onchange="updateCheck(${i},this.checked)"></td></tr>`;
  });
  tbody.innerHTML=html+orderHtml;renderFoot(rows);renderPanels();updateSelectedInfo();
  // Operátor: deaktivuj všechna vstupní pole v tabulce po každém re-renderu
  if (_role === 'operator') {
    document.querySelectorAll('table input, table select, table textarea').forEach(el => { el.disabled = true; });
  }
}

function renderFoot(rows){
  const rate=n(plantRate.value)||150;
  let html=`<tr class="hours-row"><td colspan="6" style="text-align:left;padding-left:12px;font-size:11px;font-weight:700;letter-spacing:.2px">průměrná doba výroby obalovny (hod.)</td>`;
  dayKeys.forEach(k=>{html+=`<td>${fmtNum(daySum(rows,k)/rate,1)}</td>`;});
  html+=`<td>${fmtNum(dayKeys.reduce((s,k)=>s+daySum(rows,k),0)/rate,1)}</td><td></td></tr>`;
  tfoot.innerHTML=html;
}

function updateSelectedInfo(){
  const checked=(_rows||[]).map((r,i)=>r.checked?i:-1).filter(i=>i>=0);
  const c=checked.length;
  selectedInfo.textContent=c?'Zatrženo řádků: '+c:'Není zatržen žádný řádek';
  // Tlačítka ▲/▼ aktivní jen když je zatržen právě jeden řádek a není na okraji
  const up=document.getElementById('moveUpBtn');
  const dn=document.getElementById('moveDownBtn');
  if(up&&dn){
    const single = (c===1) ? checked[0] : -1;
    up.disabled = (single<=0);
    dn.disabled = (single<0 || single>=(_rows||[]).length-1);
    const hint = c===0 ? 'Nejdřív zatrhni jeden řádek' : c>1 ? 'Označen víc než jeden řádek' : '';
    if (hint) { up.title=hint; dn.title=hint; }
    else { up.title='Přesunout označený řádek nahoru'; dn.title='Přesunout označený řádek dolů'; }
  }
}
// Pomocné: před přesunem vyvolej blur na případně editované buňce,
// aby se její neuložená hodnota dostala přes onchange do _rows.
function _commitEditingCell(){
  const el=document.activeElement;
  if(el && el.closest && el.closest('#weekTable')) el.blur();
}
function moveCheckedUp(){
  _commitEditingCell();
  const checked=_rows.map((r,i)=>r.checked?i:-1).filter(i=>i>=0);
  if(checked.length!==1) return;
  const i=checked[0];
  if(i<=0) return;
  snapshot();
  [_rows[i-1],_rows[i]] = [_rows[i],_rows[i-1]];   // řádek si nese 'checked' s sebou
  render();saveRows();
}
function moveCheckedDown(){
  _commitEditingCell();
  const checked=_rows.map((r,i)=>r.checked?i:-1).filter(i=>i>=0);
  if(checked.length!==1) return;
  const i=checked[0];
  if(i>=_rows.length-1) return;
  snapshot();
  [_rows[i+1],_rows[i]] = [_rows[i],_rows[i+1]];
  render();saveRows();
}
function updateCheck(i,val){_rows[i].checked=val;render();saveRows()}
function updateMixSelect(i,key,val){snapshot();let m=key==='cislo'?mixByNumber(val):key==='smes'?mixByName(val):mixByItt(val);applyMix(_rows[i],m);render();saveRows()}
function updateCell(i,key,val,autofill=false,integer=false){snapshot();_rows[i][key]=integer?intVal(val):val;render();saveRows()}
function addRow(){snapshot();_rows.push({checked:false,cislo:'',lokalita:'',objednavka:'',smes:'',itt:'',ceta:'',d0:'',d1:'',d2:'',d3:'',d4:'',d5:'',d6:'',lat:null,lng:null});render();saveRows()}
function deleteCheckedRows(){if(!_rows.some(r=>r.checked)){alert('Nejdřív zatrhni řádky ke smazání.');return}snapshot();_rows=_rows.filter(r=>!r.checked);render();saveRows()}
function undoLast(){if(!undoStack.length){alert('Není co vrátit zpět.');return}_rows=JSON.parse(undoStack.pop());render();saveRows()}

  const d=new Date(_weekStart);d.setDate(d.getDate()+delta*7);
  _weekStart=d.toISOString().slice(0,10);

  if(_role==='admin'&&typeof OA!=='undefined'&&_settings.orders_enabled!=='false')await OA.loadPendingGroups();
  if(IS_MOBILE)renderMobile();else render();
}

  if(_role==='admin'&&typeof OA!=='undefined'&&_settings.orders_enabled!=='false')await OA.loadPendingGroups();

  const r=await fetch('/api/export');const payload=await r.json();
  let css='table{border-collapse:collapse;font-family:Arial;font-size:10pt;margin-bottom:18px}th,td{border:1px solid #222;padding:4px;text-align:center}th{font-weight:bold;background:#f2f2f2}.blue-day{background:#ddebf7}.gray-day{background:#d9d9d9}.sum-head{background:#fce4d6;font-weight:bold}.cap-value{background:#ffe600;font-weight:bold}.hours-row td{background:#d9d9d9;font-weight:bold}';
  let html='<html><head><meta charset="UTF-8"><style>'+css+'</style></head><body><!--HMG_WEEK_DATA:'+btoa(unescape(encodeURIComponent(JSON.stringify(payload))))+'--><h1>HARMONOGRAM VÝROBY - export týdnů</h1>';
  payload.weeks.forEach(w=>{html+=weekTableHtml(w.start,w.rows)});

}
function weekTableHtml(start,rows){
  const rate=n(plantRate.value)||150;const week=isoWeek(new Date(start));let dates=dayKeys.map((_,i)=>isoDateFromStart(start,i));let total=dayKeys.reduce((s,k)=>s+daySum(rows,k),0);
  let s='<table><tr><th colspan="15">Kalendářní týden č. '+week+' | '+fmtTitleRange(start)+'</th></tr>';
  s+=`<tr><th colspan="2">Denní kapacita plynu:</th><th>${_settings.hmg_gas_capacity||'10 000'} m3</th><th></th><th colspan="2" style="text-align:right">Součet t/den:</th>${dayKeys.map(k=>`<th class="sum-head">${fmtNum(daySum(rows,k))}</th>`).join('')}<th class="sum-head">${total}</th></tr>`;
  s+='<tr><th>č.</th><th>lokalita</th><th>objednávka</th><th>Směs a průkazná zk. typu</th><th>ITT</th><th>četa</th>'+dates.map((d,i)=>'<th class="'+(i>=5?'gray-day':'blue-day')+'">'+fmtShort(d)+'</th>').join('')+'<th>souhrn</th></tr>';
  rows.forEach(r=>{s+='<tr><td>'+esc(r.cislo)+'</td><td>'+esc(r.lokalita)+'</td><td>'+esc(r.objednavka)+'</td><td>'+esc(r.smes)+'</td><td>'+esc(r.itt)+'</td><td>'+esc(r.ceta)+'</td>';dayKeys.forEach((k,i)=>s+='<td class="'+(i>=5?'gray-day':'blue-day')+'">'+esc(r[k])+'</td>');s+='<td><b>'+rowSum(r)+'</b></td></tr>'});
  s+='<tr class="hours-row"><td colspan="6">průměrná doba výroby obalovny (hod.)</td>'+dayKeys.map(k=>'<td>'+(daySum(rows,k)/rate).toFixed(1).replace('.',',')+'</td>').join('')+'<td>'+(total/rate).toFixed(1).replace('.',',')+'</td></tr></table>';
  return s;
}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500)}

let _miniCalY=new Date().getFullYear(),_miniCalM=new Date().getMonth();
const _mcMonths=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
function getMondayStr(d){const x=new Date(d);x.setDate(d.getDate()-((d.getDay()||7)-1));return localIso(x);}
function toggleMiniCal(){const c=document.getElementById('miniCal');if(c.style.display==='none'){const now=new Date();_miniCalY=now.getFullYear();_miniCalM=now.getMonth();c.style.display='block';renderMiniCal();}else{c.style.display='none';}}
document.addEventListener('click',function(e){const cal=document.getElementById('miniCal');const btn=document.getElementById('calToggleBtn');if(cal&&cal.style.display!=='none'&&!cal.contains(e.target)&&!(btn&&btn.contains(e.target))){cal.style.display='none';}});
function shiftMiniCal(d){_miniCalM+=d;if(_miniCalM>11){_miniCalM=0;_miniCalY++;}if(_miniCalM<0){_miniCalM=11;_miniCalY--;}renderMiniCal();}
function renderMiniCal(){
  document.getElementById('miniCalHeader').textContent=_mcMonths[_miniCalM]+' '+_miniCalY;
  const grid=document.getElementById('miniCalGrid');const cells=grid.querySelectorAll('.mc-day');cells.forEach(c=>c.remove());
  const firstDay=new Date(_miniCalY,_miniCalM,1).getDay();const offset=firstDay===0?6:firstDay-1;const dim=new Date(_miniCalY,_miniCalM+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);const todayMon=getMondayStr(today);const curStart=_weekStart;
  for(let i=0;i<offset;i++){const el=document.createElement('div');el.className='mc-day';el.style.cssText='padding:5px;font-size:13px;';grid.appendChild(el);}
  for(let d=1;d<=dim;d++){
    const el=document.createElement('div');el.className='mc-day';const dd=new Date(_miniCalY,_miniCalM,d);dd.setHours(0,0,0,0);const mon=getMondayStr(dd);
    const isToday=dd.getTime()===today.getTime();const isTodayWeek=mon===todayMon;const isSelWeek=mon===curStart;const isWe=dd.getDay()===0||dd.getDay()===6;
    let bg=isTodayWeek?'#eff6ff':'transparent';let color=isWe?'#9ca3af':'#111';let fw=isToday?'900':'400';let border=isSelWeek?'2px solid #2563eb':'1px solid transparent';let br=isToday?'50%':'4px';
    if(isToday){bg='#2563eb';color='#fff';}
    el.style.cssText='padding:5px;font-size:13px;text-align:center;border-radius:'+br+';cursor:pointer;background:'+bg+';color:'+color+';font-weight:'+fw+';box-sizing:border-box;border:'+border+';font-family:Inter,sans-serif;';
    el.textContent=d;el.title=dd.toLocaleDateString('cs-CZ');
    el.onclick=(function(m){return async function(){setWeekStart(m);await loadWeek(m);render();document.getElementById('miniCal').style.display='none';};})(mon);
    grid.appendChild(el);
  }
}

// ── GPS stav ──
let _mapyCzKey='';let _mapRowIdx=-1;let _mapTempCoords=null;

async function openMapPopup(rowIdx,e){
  if(e){e.stopPropagation();e.preventDefault();}
  _mapRowIdx=rowIdx;
  const row=_rows[rowIdx];
  _mapTempCoords=(row.lat!=null&&row.lng!=null)?{lat:+row.lat,lng:+row.lng}:null;
  document.getElementById('mapPopupTitle').textContent='📍 '+(row.lokalita||'GPS souřadnice');
  document.getElementById('mapSearchInput').value=row.lokalita||'';
  document.getElementById('mapLatInput').value='';
  document.getElementById('mapLngInput').value='';
  document.getElementById('mapOverlay').classList.add('open');
  if(_mapTempCoords){
    // Máme uložené souřadnice — zobraz rovnou
    updateMapInputs(_mapTempCoords.lat,_mapTempCoords.lng);
    showMapImage(_mapTempCoords.lat,_mapTempCoords.lng);
  } else if(row.lokalita&&row.lokalita.trim()){
    // Geocoduj název lokality
    showMapLoading();
    await geocodeAndShow(row.lokalita);
  } else {
    showMapPlaceholder();
  }
}

// Geocoding přes Mapy.cz REST API v1
async function geocodeAddress(query){
  const url=`https://api.mapy.cz/v1/geocode?query=${encodeURIComponent(query)}&lang=cs&limit=1&apikey=${_mapyCzKey}`;
  const r=await fetch(url);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  if(d.items&&d.items.length>0){const p=d.items[0].position;return{lat:p.lat,lng:p.lon};}
  return null;
}

async function geocodeAndShow(query){
  try{
    const coords=await geocodeAddress(query);
    if(coords){
      _mapTempCoords=coords;
      updateMapInputs(coords.lat,coords.lng);
      showMapImage(coords.lat,coords.lng);
    } else {
      showMapMsg('⚠️ Adresa nenalezena — zadejte souřadnice ručně nebo upřesněte hledaný výraz.');
    }
  }catch(ex){
    showMapMsg('❌ Chyba geocodingu: '+esc(ex.message));
  }
}

// Mapa jako iframe OpenStreetMap (zobrazí interaktivní mapu s pinem, bez API klíče)
function showMapImage(lat,lng){
  const d=0.008; // bbox padding ~900m
  const bbox=`${lng-d},${lat-d},${lng+d},${lat+d}`;
  const src=`https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${lat},${lng}`;
  document.getElementById('mapImgArea').innerHTML=
    `<iframe src="${src}" style="width:100%;height:360px;border:none;display:block" loading="lazy" title="Mapa lokality"></iframe>`+
    `<div style="text-align:right;padding:3px 8px;background:#f9fafb;border-top:0.5px solid #e5e7eb;font-size:10px;color:#9ca3af">© <a href="https://www.openstreetmap.org/copyright" target="_blank" style="color:#9ca3af">OpenStreetMap</a></div>`;
}
function showMapLoading(){
  document.getElementById('mapImgArea').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:center;height:360px;color:#6b7280;font-size:13px;gap:8px">⏳ Načítám…</div>';
}
function showMapMsg(msg){
  document.getElementById('mapImgArea').innerHTML=
    `<div style="display:flex;align-items:center;justify-content:center;height:240px;font-size:13px;color:#6b7280;padding:24px;text-align:center">${msg}</div>`;
}
function showMapPlaceholder(){
  document.getElementById('mapImgArea').innerHTML=
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;color:#9ca3af;font-size:13px;gap:10px"><div style="font-size:36px">🗺️</div><div style="text-align:center">Zadejte adresu do vyhledávacího pole<br>nebo souřadnice níže</div></div>';
}
function updateMapInputs(lat,lng){
  document.getElementById('mapLatInput').value=lat.toFixed(6);
  document.getElementById('mapLngInput').value=lng.toFixed(6);
}

async function geocodeSearch(){
  const q=document.getElementById('mapSearchInput').value.trim();
  if(!q)return;
  showMapLoading();
  await geocodeAndShow(q);
}

function applyManualCoords(){
  const lat=parseFloat(document.getElementById('mapLatInput').value);
  const lng=parseFloat(document.getElementById('mapLngInput').value);
  if(isNaN(lat)||isNaN(lng)){alert('Zadejte platné souřadnice.');return;}
  if(lat<-90||lat>90||lng<-180||lng>180){alert('Souřadnice mimo rozsah (lat ±90, lng ±180).');return;}
  _mapTempCoords={lat,lng};
  showMapImage(lat,lng);
}

function saveGpsCoords(){
  // Přečti aktuální hodnoty vstupů (uživatel mohl ručně upravit)
  const latV=parseFloat((document.getElementById('mapLatInput')||{}).value);
  const lngV=parseFloat((document.getElementById('mapLngInput')||{}).value);
  if(!isNaN(latV)&&!isNaN(lngV)&&latV>=-90&&latV<=90&&lngV>=-180&&lngV<=180){
    _mapTempCoords={lat:latV,lng:lngV};
  }
  if(_mapRowIdx>=0&&_rows[_mapRowIdx]){
    snapshot();
    _rows[_mapRowIdx].lat=_mapTempCoords?_mapTempCoords.lat:null;
    _rows[_mapRowIdx].lng=_mapTempCoords?_mapTempCoords.lng:null;
    saveRows();render();
  }
  closeMapPopup();
}

function closeMapPopup(){
  document.getElementById('mapOverlay').classList.remove('open');
  document.getElementById('mapImgArea').innerHTML='';
  _mapRowIdx=-1;_mapTempCoords=null;
}

// ── INIT ──
async function init(){
  // Načti Mapy.cz API klíč
  try{const cfg=await fetch('/api/config').then(r=>r.json());if(cfg&&cfg.mapyCzKey)_mapyCzKey=cfg.mapyCzKey;}catch(ex){}
  // Načti nastavení
  const s=await fetch('/api/settings').then(r=>r.json()).catch(()=>({}));
  if(s&&Object.keys(s).length)_settings=s;
  const _ordersEnabled=_settings.orders_enabled!=='false'; // výchozí true
  document.getElementById('plantRate').value=_settings.hmg_plant_rate||'150';
  // Načti směsi
  const mixes=await fetch('/api/inputs').then(r=>r.json()).catch(()=>null);
  if(mixes)_mixes=mixes;
  // Načti firmy
  const companies=await fetch('/api/companies').then(r=>r.json()).catch(()=>null);
  if(companies)_companies=companies;
  // Načti týden
  await loadWeek(_weekStart);
  // Zjisti roli (před renderem, aby order řádky věděly zda admin)
  if(!IS_MOBILE) await checkOperatorRole();
  else await loadMobileUser();
  if(IS_MOBILE) renderMobile(); else render();
  // Objednávky — jen admin, desktop, jen když je systém zapnut
  if(!IS_MOBILE && _role==='admin' && typeof OA!=='undefined' && _ordersEnabled){
    OA.initBanner(document.querySelector('.actions'), true);
    await OA.loadPendingGroups();
    OA.updateBanner(OA.getPendingGroups().length);
    OA.setOnAfterAction(async(fullReload)=>{
      if(fullReload)await loadWeek(_weekStart);
      render();
    });
    OA.setNavigateToDate(async(datum)=>{
      // Najdi pondělí týdne obsahujícího datum
      const d=new Date(datum+'T00:00:00');
      const day=d.getDay()||7;
      d.setDate(d.getDate()-day+1);
      const targetWeek=localIso(d);
      if(targetWeek!==_weekStart){
        _weekStart=targetWeek;
        await loadWeek(_weekStart);
        await OA.loadPendingGroups();
        render();
      }
    });
    render(); // překresli s order řádky
    setInterval(async()=>{await OA.refreshBanner();render();},60000);
  }
}
init();
