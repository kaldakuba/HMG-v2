<!doctype html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HARMONOGRAM VÝROBY – Přehled</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',Arial,sans-serif;background:#f0f2f5;color:#111;-webkit-font-smoothing:antialiased;font-size:110%}
.topbar{background:#1a1a2e;color:#fff;min-height:64px;padding:0 16px;display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.title-left{font-size:15px;font-weight:700;color:#c8d0e0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar h1{margin:0;text-align:center;font-size:22px;font-weight:800;letter-spacing:2px;color:#fff}
.actions{display:flex;justify-content:flex-end;gap:8px;align-items:center;flex-wrap:wrap}
.btn{border-radius:6px;border:none;color:#fff;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;padding:7px 14px;font-size:13px;white-space:nowrap;transition:filter .15s}
.btn:hover:not(:disabled){filter:brightness(1.12)}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn.nav{background:#64748b}
.ro-badge{display:inline-flex;align-items:center;gap:5px;background:#fee2e2;color:#991b1b;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.wrap{padding:10px 12px}
.card{background:#fff;border:1px solid #a0aabb;border-radius:8px;overflow:hidden}
.month-toolbar{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #a0aabb;background:#fff}
.month-toolbar .right{margin-left:auto;display:flex;gap:8px;align-items:center}
input[type=month]{height:34px;border:1px solid #a0aabb;border-radius:6px;padding:2px 10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:#374151;background:#f8fafc;cursor:pointer}
input[type=month]:focus{outline:2px solid #3b82f6;border-color:#3b82f6}
.table-wrap{overflow:auto;background:#fff}
table{border-collapse:collapse;table-layout:fixed;min-width:100px;width:max-content;font-size:13px}
th,td{border:1px solid #a0aabb;height:28px;padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
th{font-weight:700;background:#f5f7fa;font-size:12px;color:#374151;letter-spacing:.2px}
.col-lok{width:150px}.col-obj{width:150px}.col-smes{width:230px}.col-itt{width:100px}.col-ceta{width:110px}.day{width:60px}
.sum-head{background:#dbeafe!important;font-weight:800;color:#1e3a8a!important}
.blue{background:#eff6ff}.gray{background:#f3f4f6}
.holiday{background:#f0fdf4!important;color:#15803d}
.today-col{background:#fef9c3!important;color:#854d0e!important;font-weight:700}
.missing-order{background:#fef9c3!important;color:#854d0e}
.group-top td{border-top:3px solid #a0aabb}
.sticky-head th{position:sticky;top:0;z-index:3}
.sticky-head-2 th{position:sticky;top:28px;z-index:3}
.left-head{background:#dbeafe!important;color:#1e3a8a!important}
.legend{font-size:12px;text-align:center;padding:8px 12px;border-top:1px solid #a0aabb;background:#f8fafc;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:5px;font-weight:500;color:#374151}
.box{display:inline-block;width:14px;height:10px;border:1px solid #a0aabb;border-radius:2px}
.note{text-align:center;font-size:11px;color:#6b7280;padding:6px 12px;border-top:1px solid #a0aabb;background:#f8fafc}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
.over-limit{background:#fee2e2!important;color:#991b1b!important;font-weight:800!important}
@media(max-width:900px){.topbar{display:flex;flex-direction:column;align-items:stretch;padding:10px;min-height:auto}.topbar h1{text-align:left;font-size:16px}.actions{justify-content:flex-start}.wrap{padding:6px}}
</style>
</head>
<body>
<header class="topbar">
  <div class="title-left">
    <span id="pageTitle">Měsíční přehled</span>
    <span id="viewerEmail" style="font-size:11px;color:#94a3b8;"></span>
    <span class="ro-badge">&#128274; pouze čtení</span>
  </div>
  <h1>HARMONOGRAM VÝROBY</h1>
  <div class="actions">
    <button class="btn nav" disabled title="Přístup k minulým měsícům není povolen">‹ Předchozí</button>
    <button class="btn nav" onclick="thisMonth()">Tento měsíc</button>
    <button class="btn nav" onclick="shiftMonth(1)">Další ›</button>
  </div>
</header>
<main class="wrap"><section class="card">
  <div class="month-toolbar">
    <div class="right" style="margin-left:auto">
      <input id="monthPick" type="month" onchange="onMonthChange()">
    </div>
  </div>
  <div class="table-wrap" id="tableWrap"></div>
  <div class="legend">
    <span><i class="box" style="background:#eff6ff"></i> všední den</span>
    <span><i class="box" style="background:#f3f4f6"></i> víkend</span>
    <span><i class="box" style="background:#f0fdf4;border-color:#86efac"></i> svátek ČR</span>
    <span><i class="box" style="background:#fef9c3;border-color:#fde68a"></i> dnes / chybí obj.</span>
  </div>
  <div class="note">Zobrazují se pouze dnešní a budoucí dny. Data se aktualizují v reálném čase.</div>
</section></main>

<script>
// ── TOKEN CHECK ──
let _maxDaily = 1500;
let _accessOk = false; // default, přepíše se ze settings

async function loadSettings() {
  try {
    const url = '/api/settings' + (_urlToken ? '?t=' + _urlToken : '');
    const s = await fetch(url).then(r => r.json());
    if (s && s.hmg_max_daily) _maxDaily = parseInt(s.hmg_max_daily) || 1500;
  } catch(e) {}
}

const _urlToken = new URLSearchParams(location.search).get('t') || localStorage.getItem('hmg_view_token') || '';

async function checkAccess() {
  // Nejdřív zkus přihlášeného uživatele přes session (hmg_share role)
  try {
    const me = await fetch('/api/me').then(r => r.json());
    if (me && me.role) {
      _accessOk = true;
      const emailEl = document.getElementById('viewerEmail');
      if (emailEl && me.username) emailEl.textContent = me.username;
      return true;
    }
  } catch(e) {}
  // Fallback: kontrola URL tokenu (pro sdílené odkazy bez přihlášení)
  if (!_urlToken) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif"><div style="text-align:center;padding:40px"><h2 style="color:#991b1b">Přístup zamítnut</h2><p style="color:#6b7280">Nemáte platný přístupový odkaz.</p></div></div>';
    return false;
  }
  localStorage.setItem('hmg_view_token', _urlToken);
  try {
    const r = await fetch('/api/viewer-check?t=' + _urlToken);
    const d = await r.json();
    if (!d.ok) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Inter,sans-serif"><div style="text-align:center;padding:40px"><h2 style="color:#991b1b">Přístup zamítnut</h2><p style="color:#6b7280">Váš přístup byl odvolán nebo odkaz je neplatný.</p></div></div>';
      return false;
    }
    const emailEl = document.getElementById('viewerEmail');
    if (emailEl && d.email) emailEl.textContent = d.email;
  } catch(e) {}
  _accessOk = true;
  return true;
}

// ── POMOCNÉ FUNKCE ──
function todayIso(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function defaultMonth(){const d=new Date();return d.toISOString().slice(0,7)}
function monthName(m){return['LEDEN','ÚNOR','BŘEZEN','DUBEN','KVĚTEN','ČERVEN','ČERVENEC','SRPEN','ZÁŘÍ','ŘÍJEN','LISTOPAD','PROSINEC'][m]}
function iso(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')}
function esc(v){return String(v||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function n(v){const x=parseInt(String(v||'').replace(/\D+/g,''),10);return isNaN(x)?0:x}

function easterSunday(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da)}
function addDays(date,days){const d=new Date(date);d.setDate(d.getDate()+days);return d}
function isHoliday(id){const[y,m,d]=id.split('-').map(Number);const fixed=['01-01','05-01','05-08','07-05','07-06','09-28','10-28','11-17','12-24','12-25','12-26'];if(fixed.includes(String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')))return true;const e=easterSunday(y);return id===addDays(e,-2).toISOString().slice(0,10)||id===addDays(e,1).toISOString().slice(0,10)}

function dayClass(y,m,d){
  const id=iso(y,m,d);
  const today=todayIso();
  if(id===today) return 'today-col';
  if(isHoliday(id)) return 'holiday';
  const dow=new Date(y,m,d).getDay();
  return(dow===0||dow===6)?'gray':'blue';
}

function loadCompanies(){
  try{return JSON.parse(localStorage.getItem('hmg_companies')||'null')||[{name:'Colas',color:'#fff2a8'},{name:'Firesta',color:'#d9ead3'},{name:'Mi Roads',color:'#ff7f86'}]}
  catch(e){return[]}
}
function companyColor(name){const c=loadCompanies().find(x=>x.name===name);return c?c.color:''}

function daySum(entries,id){return(entries[id]||[]).reduce((s,e)=>s+n(e.tuny),0)}

const FIRMA_ORDER = {'Colas': 0, 'Firesta': 1, 'Mi Roads': 2};
function rowsForMonth(y,m,entries){
  const map={};
  Object.keys(entries).sort().forEach(id=>{
    const dt=new Date(id);
    if(dt.getFullYear()===y&&dt.getMonth()===m){
      (entries[id]||[]).forEach(e=>{
        if(!(e.smes||'').trim()||!(e.itt||'').trim()||!(e.ceta||'').trim())return;
        const key=[e.lokalita||'',e.objednavka||'',e.smes||'',e.itt||'',e.ceta||''].join('|');
        if(!map[key])map[key]={lokalita:e.lokalita||'',objednavka:e.objednavka||'',smes:e.smes||'',itt:e.itt||'',ceta:e.ceta||'',days:{}};
        const d=dt.getDate();
        map[key].days[d]=(map[key].days[d]||0)+n(e.tuny);
      });
    }
  });
  const result = Object.values(map);
  result.sort((a, b) => {
    const oa = FIRMA_ORDER[a.ceta] !== undefined ? FIRMA_ORDER[a.ceta] : 99;
    const ob = FIRMA_ORDER[b.ceta] !== undefined ? FIRMA_ORDER[b.ceta] : 99;
    if (oa !== ob) return oa - ob;
    return (a.lokalita || '').localeCompare(b.lokalita || '', 'cs');
  });
  return result;
}

// ── RENDER ──
async function renderMonth(){
  // Udržovat token v URL
  if(_urlToken && !new URLSearchParams(location.search).get('t')){
    const u=new URL(location.href);u.searchParams.set('t',_urlToken);history.replaceState({},'',u);
  }
  const val=monthPick.value||defaultMonth();
  const[yy,mm]=val.split('-');
  const y=parseInt(yy),m=parseInt(mm)-1;
  pageTitle.textContent='Měsíční přehled | '+monthName(m)+' / '+y;

  const today=todayIso();
  const[ty,tm,td]=today.split('-').map(Number);
  const totalDays=new Date(y,m+1,0).getDate();

  // Které dny zobrazit: jen od dnešku dál (pokud jsme v aktuálním nebo budoucím měsíci)
  const isCurrentMonth=(y===ty && m===tm-1);
  const isPastMonth=(y<ty || (y===ty && m<tm-1));

  // Minulý měsíc – nic nezobrazíme (nemělo by nastat, ale pro jistotu)
  let visibleDays=[];
  for(let d=1;d<=totalDays;d++){
    const id=iso(y,m,d);
    if(isPastMonth){
      // celý měsíc je v minulosti – nezobrazíme vůbec
    } else if(isCurrentMonth){
      if(id>=today) visibleDays.push(d);
    } else {
      visibleDays.push(d); // budoucí měsíc – vše
    }
  }

  // Načíst data ze serveru (předat token pokud je v URL)
  // Data načítáme z /api/weeks - stejný zdroj jako týdenní kalendář
  let entries={};
  try{
    const url='/api/weeks'+(_urlToken?'?t='+_urlToken:'');
    const weeks=await fetch(url).then(r=>r.json());
    (weeks||[]).forEach(w=>{
      const start=w.start;
      const rows=w.rows||[];
      for(let i=0;i<7;i++){
        const d=new Date(start);d.setDate(d.getDate()+i);
        const isoStr=d.toISOString().slice(0,10);
        entries[isoStr]=[];
        rows.forEach(r=>{
          const tuny=parseInt(r['d'+i]||'0',10);
          if(tuny>0)entries[isoStr].push({
            lokalita:r.lokalita||'',objednavka:r.objednavka||'',
            smes:r.smes||'',itt:r.itt||'',ceta:r.ceta||'',tuny
          });
        });
      }
    });
  }catch(e){console.error('Chyba načítání dat:',e);}

  const rows=rowsForMonth(y,m,entries);

  if(isPastMonth || visibleDays.length===0){
    tableWrap.innerHTML='<div style="padding:40px;text-align:center;color:#6b7280;font-size:14px">Pro tento měsíc nejsou k dispozici žádná budoucí data.</div>';
    return;
  }

  let h='<table id="monthTable"><thead>';
  // Řádek součtů
  h+='<tr class="sticky-head"><th class="left-head col-lok"></th><th class="left-head col-obj"></th><th class="left-head col-smes"></th><th class="left-head col-itt"></th><th class="left-head col-ceta">Součet t/den:</th>';
  visibleDays.forEach(d=>{const _ds=daySum(entries,iso(y,m,d));h+='<th class="sum-head day'+(_ds>0&&_ds>=_maxDaily?' over-limit':'')+'">'+_ds+'</th>';});
  h+='</tr>';
  // Řádek datumů
  h+='<tr class="sticky-head-2"><th class="col-lok">lokalita</th><th class="col-obj">objednávka</th><th class="col-smes">Směs a průkazná zk. typu</th><th class="col-itt">ITT</th><th class="col-ceta">četa</th>';
  visibleDays.forEach(d=>{
    const cls=dayClass(y,m,d);
    h+='<th class="day '+cls+'" style="font-size:11px">'+d+'.'+(m+1)+'.'+(cls==='today-col'?' ▲':'')+'</th>';
  });
  h+='</tr></thead><tbody>';

  if(!rows.length){
    for(let i=0;i<10;i++){
      h+='<tr><td></td><td></td><td></td><td></td><td></td>';
      visibleDays.forEach(d=>h+='<td class="'+dayClass(y,m,d)+'"></td>');
      h+='</tr>';
    }
  } else {
    rows.forEach((r,idx)=>{
      const color=companyColor(r.ceta);
      h+='<tr class="'+(idx%4===0?'group-top':'')+'" style="'+(color?'background:'+color:'')+'"><td style="text-align:left;padding-left:8px">'+esc(r.lokalita)+'</td><td class="'+(!r.objednavka?'missing-order':'')+'">'+esc(r.objednavka)+'</td><td style="text-align:left;padding-left:6px">'+esc(r.smes)+'</td><td style="font-size:11px">'+esc(r.itt)+'</td><td>'+esc(r.ceta)+'</td>';
      visibleDays.forEach(d=>h+='<td class="'+dayClass(y,m,d)+'">'+(r.days[d]||'')+'</td>');
      h+='</tr>';
    });
  }
  h+='</tbody></table>';
  tableWrap.innerHTML=h;
}

// ── NAVIGACE (pouze dopředu) ──
function onMonthChange(){
  const val=monthPick.value||defaultMonth();
  const today=defaultMonth();
  // Nedovolíme přejít na minulý měsíc přes input
  if(val<today){monthPick.value=today;}
  renderMonth();
}

function getToken(){return new URLSearchParams(location.search).get('t')||'';}
function shiftMonth(delta){
  const val=monthPick.value||defaultMonth();
  const[y,m]=val.split('-').map(Number);
  let ny=y,nm=m-1+delta;
  if(nm>11){nm=0;ny++;}if(nm<0){nm=11;ny--;}
  const newVal=ny+'-'+String(nm+1).padStart(2,'0');
  const today=defaultMonth();
  if(newVal<today) return;
  monthPick.value=newVal;
  // Zachovat token v URL
  const t=_urlToken;
  if(t){const u=new URL(location.href);u.searchParams.set('t',t);history.replaceState({},'',u);}
  renderMonth();
}

function thisMonth(){
  monthPick.value=defaultMonth();
  renderMonth();
}

// Blokuj input na minulé měsíce
function setMonthMin(){
  const today=defaultMonth();
  document.getElementById('monthPick').min=today;
}

// Automatická obnova každých 5 minut
setInterval(()=>{if(_accessOk) renderMonth();}, 3*60*1000);

setMonthMin();
monthPick.value=localStorage.getItem('hmg_view_month')||defaultMonth();
checkAccess().then(ok => { if(ok) { loadSettings().then(() => renderMonth()); } });
</script>
</body>
</html>
